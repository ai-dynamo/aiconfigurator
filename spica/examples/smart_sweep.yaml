# Example Spica config — maps directly to SmartSearchConfig.
search_space:
  deployment_mode: [disagg, agg]
  model_name: deepseek-ai/DeepSeek-V3
  hardware_sku: h200_sxm
  gpu_budget: 32
  backend: [vllm]
  router_mode: [kv_router, round_robin]
  planner_scaling_policy: [disabled, throughput_180_5, hybrid_180_5]
  # other *_candidates omitted -> defaults apply
workload:
  trace_path: /data/replay/traffic.jsonl   # or omit and set a synthetic load (see below)
  trace_format: mooncake
  # Synthetic instead of a trace: set isl/osl + ONE of request_rate (open-loop) or
  # concurrency (closed-loop), plus num_request_ratio. The request count scales with the
  # load: num_requests = round(num_request_ratio * (concurrency or request_rate)).
  #   isl: 1024
  #   osl: 1024
  #   concurrency: 64          # a single value for every goal except pareto
  #   num_request_ratio: 10    # -> 640 requests at concurrency 64
goal:
  # throughput | throughput_per_gpu | throughput_per_user | e2e_latency | goodput | goodput_per_gpu | pareto
  target: goodput_per_gpu
  sla: {ttft_ms: 2000, itl_ms: 30}  # required only for goodput / goodput_per_gpu (or a pareto with a goodput objective)
sweep:
  max_rounds: 40
  parallel_evals: 16

# --- Pareto front (e.g. reproduce an InferenceX throughput/gpu vs throughput/user curve) ---
# Multi-objective: sweep concurrency (a list) and return the non-dominated frontier. Under a
# pareto goal, workload.concurrency may be a list (the swept dimension); pareto_objectives
# defaults to [throughput_per_gpu, throughput_per_user].
#
# workload:
#   isl: 1024
#   osl: 1024
#   concurrency: [4, 8, 16, 32, 64, 128, 256]   # one Pareto point per value
#   num_request_ratio: 10
# goal:
#   target: pareto
#   # pareto_objectives: [throughput_per_gpu, throughput_per_user]   # the default
