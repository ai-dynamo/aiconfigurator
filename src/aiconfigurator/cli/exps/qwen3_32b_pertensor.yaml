# Flat V2 task schema: one key per Task field, no mode/config/worker_config nesting.
# `exps` lists which experiments to run (in order); each other top-level key is an experiment.

exps:
- exp_agg
- exp_agg_fp8_mimic
exp_agg:
  isl: 4000
  serving_mode: agg
  total_gpus: 16
  tpot: 16
  ttft: 600.0
  osl: 500
  model_path: Qwen/Qwen3-32B-FP8-Static-PerTensor
  system_name: h200_sxm
  backend_name: trtllm
exp_agg_fp8_mimic:
  isl: 4000
  serving_mode: agg
  total_gpus: 16
  tpot: 16
  ttft: 600.0
  osl: 500
  model_path: Qwen/Qwen3-32B-FP8
  system_name: h200_sxm
  backend_name: trtllm
  gemm_quant_mode: fp8_static
  moe_quant_mode: fp8
  kvcache_quant_mode: fp8
  fmha_quant_mode: fp8
  comm_quant_mode: half
