name: codeowners

# Keeps CODEOWNERS in sync with the declarative source (.github/codeowners/areas.yaml)
# and gates PRs that would leave a path unowned. Ownership STRUCTURE only -- team
# membership (who is on each team) is managed separately.

on:
  pull_request:
    paths:
      - "**"
  push:
    branches: [main]
    paths:
      - ".github/codeowners/**"
      - "CODEOWNERS"
      - "CONTRIBUTORS.md"

# This workflow runs scripts sourced from the PR diff; keep the token
# read-only and out of the persisted git config (zizmor: artipacked,
# excessive-permissions).
permissions:
  contents: read

jobs:
  codeowners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.3 pytest==8.4.2 pytest-timeout==2.4.0

      # GitHub prefers .github/CODEOWNERS and docs/CODEOWNERS over the root
      # file. Either path would silently shadow the generated policy.
      - name: Reject shadow CODEOWNERS files
        run: |
          if [[ -e .github/CODEOWNERS || -e docs/CODEOWNERS ]]; then
            echo "::error::The generated root CODEOWNERS must be the repository's only CODEOWNERS file."
            exit 1
          fi

      # Unit tests for the canonical matcher + min-cost cover. These are the
      # only piece the gates below trust -- if they fail, nothing else means
      # anything.
      - name: Unit tests (matcher + minimal_cover)
        run: |
          python -m pytest .github/codeowners/test_*.py -v \
            -p no:cacheprovider \
            --override-ini="addopts=" \
            --override-ini="filterwarnings="

      # Coverage gate: fail if any tracked file falls through to the catch-all.
      # New directories must be covered by an explicit path glob. This is the
      # only step that reads git ls-files; the drift check below is a pure
      # function of areas.yaml, so it never fires on unrelated tree churn.
      - name: Validate 100% coverage (strict)
        run: |
          python .github/codeowners/build_codeowners.py \
            --areas .github/codeowners/areas.yaml \
            --repo . \
            --strict

      # Regenerate, then fail if the committed CODEOWNERS or CONTRIBUTORS.md
      # drifted from what the sources produce. emit_codeowners.py is a PURE
      # FUNCTION of areas.yaml + external_contributors.yaml (no tree walk),
      # so this diff only ever fires when a policy input or a committed output
      # actually changed -- never because unrelated files moved on the base
      # branch.
      - name: Regenerate and check for drift
        run: |
          python .github/codeowners/emit_codeowners.py \
            --areas .github/codeowners/areas.yaml \
            --out CODEOWNERS \
            --external .github/codeowners/external_contributors.yaml \
            --contributors-out CONTRIBUTORS.md
          if [[ -n "$(git status --porcelain --untracked-files=all -- \
              CODEOWNERS CONTRIBUTORS.md)" ]]; then
            git diff -- CODEOWNERS CONTRIBUTORS.md || true
            git status --short --untracked-files=all -- CODEOWNERS CONTRIBUTORS.md
            echo "::error::Generated CODEOWNERS artifacts are out of date. Regenerate from areas.yaml + external_contributors.yaml and commit every changed output."
            exit 1
          fi
