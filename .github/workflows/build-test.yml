name: "Build and Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit
            paths: tests/unit
            workers: "-n 2"
          - name: e2e
            paths: tests/e2e
            workers: "-n 2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Detect generator golden changes
        id: generator-golden-changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [ -z "${base_sha}" ] || [[ "${base_sha}" =~ ^0+$ ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(src/aiconfigurator/generator/|tests/golden/generator/)'; then
            echo "run_golden=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run_golden=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Git LFS Pull
        run: git lfs pull
      - name: Print runner resources
        run: |
          echo "CPU cores: $(nproc)"
          free -h
      - name: Build wheel in container
        run: |
          docker build -f docker/Dockerfile -t aiconfigurator:build --target build .
      - name: Run tests in container
        shell: bash
        run: |
          test_paths=(${{ matrix.suite.paths }})
          if [ "${{ matrix.suite.name }}" = "unit" ] && [ "${{ steps.generator-golden-changes.outputs.run_golden }}" = "true" ]; then
            test_paths+=(tests/golden/generator)
          fi
          echo "Running pytest paths: ${test_paths[*]}"

          docker build -f docker/Dockerfile -t aiconfigurator:test --target test .
          docker run --name aic aiconfigurator:test \
            pytest \
            "${test_paths[@]}" \
            -m "unit or build" \
            -v --tb=short --maxfail=1 --timeout=600 \
            ${{ matrix.suite.workers }} \
            --md-report --md-report-verbose=1 --md-report-flavor gfm --md-report-output test_report.md
      - name: Copy test report from test Container
        if: always()
        run: |
            docker cp aic:/workspace/test_report.md ./test_report.md

  build-test-wheels:
    name: Build & test wheel (${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            archs: x86_64
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            archs: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Git LFS Pull
        run: git lfs pull
      - name: Build wheel via docker/Dockerfile
        run: |
          mkdir -p dist
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg MANYLINUX_ARCH=${{ matrix.archs }} \
            --target wheel-out \
            --output type=local,dest=./dist \
            -f docker/Dockerfile \
            .
          ls -la dist/
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Install wheel and run aiconfigurator with rust backend
        run: |
          set -euo pipefail
          uv venv --python 3.12 .venv-test
          # shellcheck disable=SC1091
          source .venv-test/bin/activate
          uv pip install dist/aiconfigurator-*.whl
          aiconfigurator cli default \
            --model-path Qwen/Qwen3-32B \
            --total-gpus 1 \
            --system h200_sxm \
            --engine-step-backend rust \
            --save-dir "${RUNNER_TEMP}/aic-out"
      - name: Extract CycloneDX SBOM from wheel
        run: |
          set -euo pipefail
          mkdir -p sbom
          # maturin's PEP 770 path drops the SBOM at
          # `<dist-info>/sboms/<crate-name>-py3.cyclonedx.json` — for us that's
          # `aiconfigurator-core-py3.cyclonedx.json`. The `*.cyclonedx.json`
          # glob future-proofs us against a maturin version that tweaks the
          # naming convention. `unzip -p` reads one file out of the wheel to
          # stdout — the wheel itself is never unpacked.
          unzip -p dist/aiconfigurator-*.whl 'aiconfigurator-*.dist-info/sboms/*.cyclonedx.json' \
            > "sbom/sbom-aiconfigurator-wheel-rust-${{ matrix.archs }}.cdx.json"
          ls -la sbom/
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-aiconfigurator-wheel-rust-${{ matrix.archs }}
          path: sbom/sbom-aiconfigurator-wheel-rust-${{ matrix.archs }}.cdx.json
          if-no-files-found: error
