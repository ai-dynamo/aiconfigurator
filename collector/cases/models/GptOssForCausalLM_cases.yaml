schema_version: 1
architecture: GptOssForCausalLM
model_path: openai/gpt-oss-120b
model_paths:
  - openai/gpt-oss-120b
  - openai/gpt-oss-20b
include_base: true
base_ops:
  - gemm
framework_specific_base_ops:
  # vLLM 0.24's GPT-OSS attention uses sinks, which the persisted generic
  # attention schema cannot encode.
  sglang:
    - attention_context
    - attention_generation
  trtllm:
    - attention_context
    - attention_generation
  vllm_xpu:
    - attention_context
    - attention_generation
description: >
  GPT-OSS MoE model-centric collection plan.

model_case_values:
  attention:
    - id: gpt_oss_attention
      model_path: openai/gpt-oss-120b
      model_aliases:
        - openai/gpt-oss-20b
      num_attention_heads: 64
      num_key_value_heads: 8
      head_dim: 64
      window_sizes: [0, 128]
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
  moe:
    - model_path: openai/gpt-oss-120b
      hidden_size: 2880
      inter_size: 2880
      topk: 4
      num_experts: 128
      framework_quantization:
        sglang:
          allowed_modes:
            - w4a16_mxfp4
            - w4a8_mxfp4_mxfp8
        trtllm:
          allowed_modes:
            - w4a16_mxfp4
            - w4a8_mxfp4_mxfp8
        vllm:
          allowed_modes:
            - w4a16_mxfp4
          module_config:
            w4a16_mxfp4:
              has_bias: true
              activation: swigluoai
        vllm_xpu:
          allowed_modes:
            - w4a16_mxfp4
      framework_cases:
        vllm_xpu:
          sweep: full
          activation: swigluoai
    - model_path: openai/gpt-oss-20b
      hidden_size: 2880
      inter_size: 2880
      topk: 4
      num_experts: 32
      framework_quantization:
        sglang:
          allowed_modes:
            - w4a16_mxfp4
            - w4a8_mxfp4_mxfp8
        trtllm:
          allowed_modes:
            - w4a16_mxfp4
            - w4a8_mxfp4_mxfp8
        vllm:
          allowed_modes:
            - w4a16_mxfp4
          module_config:
            w4a16_mxfp4:
              has_bias: true
              activation: swigluoai
        vllm_xpu:
          allowed_modes:
            - w4a16_mxfp4
      framework_cases:
        vllm_xpu:
          sweep: full
          activation: swigluoai

all_frameworks_op_cases:
  moe:
    cases: all
