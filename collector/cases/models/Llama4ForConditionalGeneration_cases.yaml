schema_version: 1
architecture: Llama4ForConditionalGeneration
model_path: meta-llama/Llama-4-Scout-17B-16E-Instruct
model_paths:
  - meta-llama/Llama-4-Scout-17B-16E-Instruct
  - meta-llama/Llama-4-Maverick-17B-128E-Instruct
include_base: true
description: >
  Llama 4 hybrid model-centric collection plan. Starts with shared base op cases;
  hybrid-MoE-specific collectors can be added here when they land.

model_case_values:
  moe:
    - model_path: meta-llama/Llama-4-Scout-17B-16E-Instruct
      hidden_size: 5120
      inter_size: 8192
      topk: 1
      num_experts: 16
    - model_path: meta-llama/Llama-4-Maverick-17B-128E-Instruct
      hidden_size: 5120
      inter_size: 8192
      topk: 1
      num_experts: 128

all_frameworks_op_cases:
  moe:
    cases: all
  attention_context:
    cases:
      - id: base_attention_context_shape_sweep
        batch_sizes: [1, 2]
        sequence_lengths: [128, 256]
        query_head_counts: [5, 10, 20, 40]
        kv_head_options: [1, 2, 4, 8]
        head_dims: [128]
        window_sizes: [8192]
  attention_generation:
    cases:
      - id: base_attention_generation_shape_sweep
        batch_sizes: [1, 2, 4, 8]
        sequence_lengths: [2, 129, 257]
        mha_query_head_counts: [5, 10, 20, 40]
        xqa_query_head_counts: [5, 10, 20, 40]
        kv_head_counts: [1, 2, 4, 8]
        head_dims: [128]
        window_sizes: [8192]
        min_batch_options_per_sequence: 1
