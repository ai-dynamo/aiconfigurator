schema_version: 1
op: moe
description: Base collector v2 cases for moe.
common_case_values:
  moe:
    token_counts:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 48
    - 64
    - 80
    - 96
    - 128
    - 160
    - 192
    - 256
    - 320
    - 384
    - 512
    - 768
    - 1024
    - 1536
    - 2048
    - 3072
    - 4096
    - 6144
    - 8192
    - 12288
    - 16384
    tensor_parallel_sizes:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    expert_parallel_sizes:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 128
    - 256
    gpu_counts:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 128
    - 256
    token_expert_distributions:
    - name: balanced
      power_law_alpha: 0.0
    - name: power_law
      power_law_alpha: 1.01
    - name: power_law
      power_law_alpha: 1.2
    constraints:
    - tensor_parallel_size * expert_parallel_size == gpu_count
    - expert_parallel_size <= num_experts
    - num_experts % expert_parallel_size == 0
    - inter_size % tensor_parallel_size == 0
    - tensor_parallel_size < max_tp_exclusive when max_tp_exclusive is set
  moe_vllm:
    quantization_modes:
    - name: bfloat16
    - name: int4_wo
    - name: fp8
      min_sm_exclusive: 86
    - name: fp8_block
      min_sm: 90
      requires_runtime_feature: per_block_fp8
    - name: nvfp4
      min_sm: 100
      requires_runtime_feature: nvfp4
    - name: w4a16_mxfp4
      requires_runtime_feature: mxfp4
      requires_model_quantization_config: true
    shape_constraints:
    - mode: fp8_block
      divisible_by:
        hidden_size: 128
        local_inter_size: 128
    - mode: nvfp4
      divisible_by:
        hidden_size: 512
        local_inter_size: 64
      max_topk: 10
    - mode: w4a16_mxfp4
      divisible_by:
        hidden_size: 32
        local_inter_size: 32
    - mode: int4_wo
      divisible_by:
        hidden_size: 128
        local_inter_size: 128
  moe_vllm_xpu:
    token_counts:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 48
    - 64
    - 80
    - 96
    - 128
    - 160
    - 192
    - 256
    - 320
    - 384
    - 512
    - 768
    - 1024
    - 1536
    - 2048
    - 3072
    - 4096
    - 6144
    - 8192
    - 12288
    - 16384
    sweeps:
      small:
        tensor_parallel_sizes: [1, 2, 4, 8]
        expert_parallel_sizes: [1, 2, 4, 8]
        gpu_counts: [1, 2, 4, 8]
      full:
        tensor_parallel_sizes: [1, 2, 4, 8, 16, 32]
        expert_parallel_sizes: [1, 2, 4, 8, 16, 32, 64, 128, 256]
        gpu_counts: [1, 2, 4, 8, 16, 32, 64, 128, 256]
    model_cases:
    - model_path: Qwen/Qwen1.5-MoE-A2.7B
      hidden_size: 2048
      inter_size: 1408
      topk: 4
      num_experts: 60
      sweep: small
      activation: silu
    - model_path: Qwen/Qwen3-30B-A3B
      hidden_size: 2048
      inter_size: 768
      topk: 8
      num_experts: 128
      max_tp_exclusive: 8
      sweep: small
      activation: silu
    - model_path: meta-llama/Llama-4-Scout-17B-16E
      hidden_size: 8192
      inter_size: 5120
      topk: 1
      num_experts: 16
      sweep: small
      activation: silu
    - model_path: Qwen/Qwen3-235B-A22B-Instruct-2507
      hidden_size: 4096
      inter_size: 1536
      topk: 8
      num_experts: 128
      sweep: small
      activation: silu
    - model_path: openai/gpt-oss-120b
      hidden_size: 2880
      inter_size: 2880
      topk: 4
      num_experts: 128
      sweep: full
      activation: swigluoai
    - model_path: openai/gpt-oss-20b
      hidden_size: 2880
      inter_size: 2880
      topk: 4
      num_experts: 32
      sweep: full
      activation: swigluoai
    quantization_modes:
    - name: bfloat16
    - name: fp8
      requires_runtime_feature: torch_fp8_e4m3fn
    - name: w4a16_mxfp4
      allowed_model_paths:
      - openai/gpt-oss-20b
      - openai/gpt-oss-120b
    model_quantization_policies:
    - model_paths:
      - openai/gpt-oss-20b
      - openai/gpt-oss-120b
      allowed_modes:
      - w4a16_mxfp4
