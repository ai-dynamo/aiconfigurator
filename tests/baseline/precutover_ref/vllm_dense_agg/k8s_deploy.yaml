apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen-qwen3-0.6b-agg
  namespace: dynamo
spec:
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        nodeSelector: &id001
          nvidia.com/gpu.product: NVIDIA-H200
        tolerations: &id002
        - key: nvidia.com/gpu
          operator: Equal
          value: 'true'
          effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0
          imagePullPolicy: IfNotPresent
    VllmWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 8
      resources:
        limits:
          gpu: '1'
      sharedMemory:
        size: 64Gi
      extraPodSpec:
        nodeSelector: *id001
        tolerations: *id002
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0
          workingDir: /workspace/examples/backends/vllm
          imagePullPolicy: IfNotPresent
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
          - --model
          - Qwen/Qwen3-0.6B
          - --tensor-parallel-size
          - '1'
          - --pipeline-parallel-size
          - '1'
          - --data-parallel-size
          - '1'
          - --max-model-len
          - '6500'
          - --max-num-seqs
          - '512'
          - --max-num-batched-tokens
          - '6012'
          env:
          - name: NCCL_CUMEM_ENABLE
            value: '1'
