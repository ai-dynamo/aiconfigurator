name: "Build and Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install and run cargo-deny
        working-directory: rust/aiconfigurator-core
        # Default log level (warn) surfaces "license inferred from file" notes
        # so any crate that may need a [[licenses.clarify]] entry is named.
        # --show-stats prints a per-license usage summary at the end.
        run: |
          cargo-deny --version || cargo install cargo-deny@0.19.0
          cargo-deny --all-features check --show-stats licenses bans

  build-and-test:
    name: Build and Test (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit
            paths: tests/unit
            workers: "-n 2"
          - name: e2e
            paths: tests/e2e
            workers: "-n 2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          lfs: true
          fetch-depth: 0
      - name: Detect generator golden changes
        id: generator-golden-changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [ -z "${base_sha}" ] || [[ "${base_sha}" =~ ^0+$ ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(src/aiconfigurator/generator/|tests/golden/generator/)'; then
            echo "run_golden=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run_golden=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Git LFS Pull
        run: git lfs pull
      - name: Print runner resources
        run: |
          echo "CPU cores: $(nproc)"
          free -h
      - name: Build wheel in container
        run: |
          docker build -f docker/Dockerfile -t aiconfigurator:build --target build .
      - name: Run tests in container
        shell: bash
        run: |
          test_paths=(${{ matrix.suite.paths }})
          if [ "${{ matrix.suite.name }}" = "unit" ] && [ "${{ steps.generator-golden-changes.outputs.run_golden }}" = "true" ]; then
            test_paths+=(tests/golden/generator)
          fi
          echo "Running pytest paths: ${test_paths[*]}"

          docker build -f docker/Dockerfile -t aiconfigurator:test --target test .
          docker run --name aic aiconfigurator:test \
            pytest \
            "${test_paths[@]}" \
            -m "unit or build" \
            -v --tb=short --maxfail=1 --timeout=600 \
            ${{ matrix.suite.workers }} \
            --md-report --md-report-verbose=1 --md-report-flavor gfm --md-report-output test_report.md
      - name: Copy test report from test Container
        if: always()
        run: |
            docker cp aic:/workspace/test_report.md ./test_report.md

  spica-thorough-e2e:
    name: Build and Test (Spica thorough e2e)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          lfs: true
          fetch-depth: 0
      - name: Git LFS Pull
        run: git lfs pull
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install AIC and Spica test dependencies
        run: |
          python -m pip install uv
          uv sync --extra dev --extra spica
          uv pip install --python .venv/bin/python maturin
      - name: Install Dynamo build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: Checkout pinned Dynamo replay source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ai-dynamo/dynamo
          ref: cb7dc1a3a74018b7824ab7ef9d0191b80946758b
          path: dynamo-src
          persist-credentials: false
          lfs: false
      - name: Build Dynamo replay bindings with AIC perf model
        working-directory: dynamo-src/lib/bindings/python
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        run: |
          VIRTUAL_ENV="${GITHUB_WORKSPACE}/.venv" \
            "${GITHUB_WORKSPACE}/.venv/bin/maturin" develop \
            --uv --release --features aic-forward-pass
      - name: Run real Spica thorough sweep
        env:
          AIC_RUN_SPICA_THOROUGH_E2E: 'true'
          AIC_SPICA_THOROUGH_E2E_ARTIFACT_DIR: ${{ runner.temp }}/spica-thorough-e2e-results
          PYTHONPATH: ${{ github.workspace }}/dynamo-src/components/src:${{ github.workspace }}/dynamo-src/lib/bindings/python/src
        run: |
          set +e
          "${GITHUB_WORKSPACE}/.venv/bin/pytest" \
            tests/e2e/cli/test_cli_default_thorough_sweep_real.py -vv
          test_status=$?
          set -e
          cat "${AIC_SPICA_THOROUGH_E2E_ARTIFACT_DIR}/stdout.txt" 2>/dev/null || true
          if [ -s "${AIC_SPICA_THOROUGH_E2E_ARTIFACT_DIR}/stderr.txt" ]; then
            cat "${AIC_SPICA_THOROUGH_E2E_ARTIFACT_DIR}/stderr.txt"
          fi
          exit "${test_status}"
      - name: Upload Spica thorough sweep results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: spica-thorough-e2e-results
          path: ${{ runner.temp }}/spica-thorough-e2e-results
          if-no-files-found: warn
          retention-days: 30
