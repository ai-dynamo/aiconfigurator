name: "Build and Test"

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit
            paths: tests/unit
            workers: "-n 2"
          - name: e2e
            paths: tests/e2e
            workers: "-n 2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Detect generator golden changes
        id: generator-golden-changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [ -z "${base_sha}" ] || [[ "${base_sha}" =~ ^0+$ ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(src/aiconfigurator/generator/|tests/golden/generator/)'; then
            echo "run_golden=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run_golden=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Git LFS Pull
        run: git lfs pull
      - name: Print runner resources
        run: |
          echo "CPU cores: $(nproc)"
          free -h
      - name: Build wheel in container
        run: |
          docker build -f docker/Dockerfile -t aiconfigurator:build --target build .
      - name: Run tests in container
        shell: bash
        run: |
          test_paths=(${{ matrix.suite.paths }})
          if [ "${{ matrix.suite.name }}" = "unit" ] && [ "${{ steps.generator-golden-changes.outputs.run_golden }}" = "true" ]; then
            test_paths+=(tests/golden/generator)
          fi
          echo "Running pytest paths: ${test_paths[*]}"

          docker build -f docker/Dockerfile -t aiconfigurator:test --target test .
          docker run --name aic aiconfigurator:test \
            pytest \
            "${test_paths[@]}" \
            -m "unit or build" \
            -v --tb=short --maxfail=1 --timeout=600 \
            ${{ matrix.suite.workers }} \
            --md-report --md-report-verbose=1 --md-report-flavor gfm --md-report-output test_report.md
      - name: Copy test report from test Container
        if: always()
        run: |
            docker cp aic:/workspace/test_report.md ./test_report.md

  build-wheels:
    name: Build wheels (${{ matrix.os }} ${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            archs: x86_64
          - os: ubuntu-24.04-arm
            archs: aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Git LFS Pull
        run: git lfs pull
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64
          CIBW_BEFORE_ALL_LINUX: >-
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
              sh -s -- -y --profile minimal --default-toolchain stable &&
            bash {project}/tools/wheel_build/install_build_tools.sh
          CIBW_BEFORE_BUILD_LINUX: >-
            cargo cyclonedx
              --manifest-path {project}/rust/aiconfigurator-core/Cargo.toml
              --format json
              --output-pattern bom
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair -w {dest_dir} {wheel} &&
            python {project}/tools/wheel_build/inject_sbom.py {dest_dir}/*.whl
              --sbom {project}/rust/aiconfigurator-core/bom.cdx.json
          CIBW_TEST_COMMAND: >-
            python -c "
            import json, importlib.metadata as md;
            from pathlib import Path;
            dist = md.distribution('aiconfigurator');
            sbom = Path(dist.locate_file('aiconfigurator-' + dist.version + '.dist-info/sboms/cyclonedx.json'));
            assert sbom.is_file(), 'SBOM missing from .dist-info/sboms/';
            data = json.loads(sbom.read_text());
            assert data.get('bomFormat') == 'CycloneDX', 'not a CycloneDX document';
            from aiconfigurator.sdk.rust_engine_step import is_rust_core_available;
            assert is_rust_core_available(), 'bundled Rust core failed to load'"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error
