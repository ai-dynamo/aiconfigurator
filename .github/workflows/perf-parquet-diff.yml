name: Create Perf Parquet Diff

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/aiconfigurator/systems/data/**/*.parquet'
      - 'src/aiconfigurator/systems/data/**/*_perf.txt'
      - 'tools/perf_database/parquet_diff.py'
      - 'tools/perf_database/parquet_textconv.py'
      - '.gitattributes'

jobs:
  parquet-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Fetch base ref and LFS objects
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git lfs install
          git lfs fetch origin "refs/remotes/origin/${BASE_REF}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarrow

      - name: Create parquet diff report
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          python tools/perf_database/parquet_diff.py \
            --base-ref "origin/${BASE_REF}" \
            --head-ref HEAD \
            --output comment.md

      - name: Upload parquet diff artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-parquet-diff
          path: comment.md
          retention-days: 30
