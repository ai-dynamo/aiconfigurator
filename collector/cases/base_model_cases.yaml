model_ops:
  - gemm
  - attention_context
  - attention_generation

all_frameworks_op_cases:
  gemm:
    cases:
      - id: base_transformer_gemm_shape_sweep
        description: >
          GEMM shapes for transformer linear layers. Expands to
          [token_count, input_features] x [input_features, output_features].
        token_counts: *base_transformer_token_counts
        feature_sizes: *base_transformer_feature_sizes
        skip_shapes:
          - input_features: 65536
            output_features: 65536
            reason: avoid the single 65536 x 65536 weight matrix
  attention_context:
    cases:
      - id: base_attention_context_shape_sweep
        description: >
          Context attention shapes. `kv_head_options: self` means
          num_key_value_heads equals the query head count.
        batch_sizes: *base_attention_context_batch_sizes
        sequence_lengths: *base_attention_context_sequence_lengths
        query_head_counts: *base_attention_query_head_counts
        kv_head_options:
          - self
          - 1
          - 2
          - 4
          - 8
        head_dims: *base_attention_head_dims
        max_tokens_self_attention: 65536
        max_tokens_grouped_query_attention: 131072
        max_batch_size_self_attention: 128
        max_kv_elements: 2147483647
        precision_cases:
          - id: bf16
            fp8_kv_cache: false
            fp8_context_fmha: false
          - id: fp8_kv_cache
            fp8_kv_cache: true
            fp8_context_fmha: false
          - id: fp8_kv_cache_and_context_fmha
            fp8_kv_cache: true
            fp8_context_fmha: true
  attention_generation:
    cases:
      - id: base_attention_generation_shape_sweep
        description: >
          Decode attention shapes. MHA uses self attention; XQA/GQA sweeps
          explicit key-value head counts.
        batch_sizes: *base_attention_generation_batch_sizes
        sequence_lengths: *base_attention_generation_sequence_lengths
        mha_query_head_counts: *base_attention_query_head_counts
        xqa_query_head_counts: *base_attention_xqa_query_head_counts
        kv_head_counts: *base_attention_kv_head_counts
        head_dims: *base_attention_head_dims
        max_mha_tokens_per_step: 8388608
        max_xqa_tokens_per_step: 16777216
        min_batch_options_per_sequence: 4
        drop_largest_sequence_for_batch_at_least: 256
        precision_cases:
          - id: bf16
            fp8_kv_cache: false
          - id: fp8_kv_cache
            fp8_kv_cache: true

framework_specific_op_cases:
  trtllm:
    compute_scale:
      cases:
        - id: trtllm_fp8_compute_scale_shape_sweep
          description: >
