schema_version: 1
architecture: MiMoV2FlashForCausalLM
model_path: XiaomiMiMo/MiMo-V2-Flash
model_paths:
  - XiaomiMiMo/MiMo-V2-Flash
include_base: true
description: >
  MiMo-V2-Flash hybrid model-centric collection plan. Starts with shared base
  cases and includes the hybrid MoE shape used by the support matrix.

model_case_values:
  attention:
    - id: mimo_v2_global_attention
      model_path: XiaomiMiMo/MiMo-V2-Flash
      num_attention_heads: 64
      num_key_value_heads: 4
      head_dim: 192
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
    - id: mimo_v2_swa_attention
      model_path: XiaomiMiMo/MiMo-V2-Flash
      num_attention_heads: 64
      num_key_value_heads: 8
      head_dim: 192
      window_size: 128
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
  moe:
    - model_path: XiaomiMiMo/MiMo-V2-Flash
      hidden_size: 4096
      inter_size: 2048
      topk: 8
      num_experts: 256
      sglang_moe_scoring_func: sigmoid
      sglang_moe_routed_scaling_factor: 1.0
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      sglang_moe_num_expert_group: 1
      sglang_moe_topk_group: 1
      sglang_moe_backends:
        fp8_block: {default: triton}

all_frameworks_op_cases:
  moe:
    cases: all
