schema_version: 1
sm_version: 90
gpu_types:
  - h100_pcie
  - h100_sxm
  - h200_sxm
description: >
  SM90 Hopper exceptions extracted from collector SM gates. Hopper supports
  FP8/block-FP8 paths but not Blackwell NVFP4 paths.

all_frameworks_op_exceptions:
  gemm:
    rules:
      - reason_type: hardware_unsupported
        reason: NVFP4 GEMM is Blackwell-only.
        fields: [gemm_type, token_count, output_features, input_features]
        match:
          gemm_type: nvfp4

framework_specific_op_exceptions:
  sglang:
    moe:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang NVFP4 MoE is only emitted for datacenter Blackwell SM100/SM103.
          fields: [moe_type, num_tokens, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha, swiglu_limit]
          match:
            moe_type: nvfp4
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 MoE collector does not support GPT-OSS MoE cases.
          fields: [moe_type, num_tokens, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha, swiglu_limit]
          match:
            model_path:
              in: [openai/gpt-oss-20b, openai/gpt-oss-120b]
        - reason_type: hardware_unsupported
          reason: SM90 H100/H200 does not support the FP4-only Nemotron MoE checkpoints, so their MoE silicon cases are not runnable for support-matrix healing.
          fields: [moe_type, num_tokens, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha, swiglu_limit]
          match:
            model_path:
              in:
                - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
                - nvidia/nemotron-ultra-rl-050826
    dsa_context_module:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang module NVFP4 GEMMs require Blackwell.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type, attention_backend]
          match:
            gemm_type: nvfp4
    dsa_generation_module:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang module NVFP4 GEMMs require Blackwell.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type, attention_backend]
          match:
            gemm_type: nvfp4
    dsv4_flash_csa_context_module:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 cannot load DeepSeek-V4-Flash module collectors because DeepseekV4ForCausalLM is not registered in the framework image.
          fields: [seq_len, batch_size, tp_size, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_kind, attention_backend]
          match:
            model_path: sgl-project/DeepSeek-V4-Flash-FP8
    dsv4_flash_hca_context_module:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 cannot load DeepSeek-V4-Flash module collectors because DeepseekV4ForCausalLM is not registered in the framework image.
          fields: [seq_len, batch_size, tp_size, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_kind, attention_backend]
          match:
            model_path: sgl-project/DeepSeek-V4-Flash-FP8
    dsv4_flash_csa_generation_module:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 cannot load DeepSeek-V4-Flash module collectors because DeepseekV4ForCausalLM is not registered in the framework image.
          fields: [seq_len, batch_size, tp_size, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_kind, attention_backend]
          match:
            model_path: sgl-project/DeepSeek-V4-Flash-FP8
    dsv4_flash_hca_generation_module:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 cannot load DeepSeek-V4-Flash module collectors because DeepseekV4ForCausalLM is not registered in the framework image.
          fields: [seq_len, batch_size, tp_size, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_kind, attention_backend]
          match:
            model_path: sgl-project/DeepSeek-V4-Flash-FP8
    mhc_module:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 cannot load the DeepSeek-V4 mHC collector because the framework image Transformers build does not recognize the deepseek_ref config.
          fields: [id]
          match:
            id:
              prefix: mhc_
  trtllm:
    moe:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM NVFP4 and W4A8-MXFP4/MXFP8 MoE modes require Blackwell.
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, min_latency_mode, model_path, token_expert_distribution, power_law_alpha]
          match:
            moe_type:
              in: [nvfp4, w4a8_mxfp4_mxfp8]
        - reason_type: hardware_unsupported
          reason: SM90 H100/H200 does not support the FP4-only Nemotron MoE checkpoints, so their MoE silicon cases are not runnable for support-matrix healing.
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, min_latency_mode, model_path, token_expert_distribution, power_law_alpha]
          match:
            model_path:
              in:
                - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
                - nvidia/nemotron-ultra-rl-050826
    attention_context:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["1.3.0rc10"]
          reason: TRT-LLM 1.3.0rc10 SM90 high-token GQA context attention cases abort with SIGABRT when context FMHA is disabled in the current framework image.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            num_heads: 96
            num_key_value_heads:
              lt_field: num_heads
            head_dim: 128
            tokens_per_block: 0
            use_fp8_context_fmha: false
            is_context_phase: true
          conditions:
            - product:
                fields: [batch_size, sequence_length]
                gte: 98304
        - reason_type: framework_version_unsupported
          version_prefixes: ["1.3.0rc10"]
          reason: TRT-LLM 1.3.0rc10 SM90 qkv_256 high-token GQA context attention cases abort with SIGABRT when context FMHA is disabled in the current framework image.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            num_heads: 96
            num_key_value_heads:
              lt_field: num_heads
            head_dim: 256
            tokens_per_block: 0
            use_fp8_context_fmha: false
            is_context_phase: true
          conditions:
            - product:
                fields: [batch_size, sequence_length]
                gte: 49152
        - reason_type: framework_version_unsupported
          version_prefixes: ["1.3.0rc10"]
          reason: TRT-LLM 1.3.0rc10 SM90 qkv_256 high-token 64-head GQA context attention cases abort with SIGABRT when context FMHA is disabled in the current framework image.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            num_heads: 64
            num_key_value_heads:
              lt_field: num_heads
            head_dim: 256
            tokens_per_block: 0
            use_fp8_context_fmha: false
            is_context_phase: true
          conditions:
            - product:
                fields: [batch_size, sequence_length]
                gte: 81920
    mla_generation:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["1.3.0rc10"]
          reason: TRT-LLM 1.3.0rc10 SM90 MLA generation FP8 KV-cache cases abort with SIGABRT in the current framework image.
          fields: [input_len, batch_size, output_len, kv_cache_dtype, num_heads, world_size, tp_size, tokens_per_block, warming_up, test_ite, is_context_phase]
          match:
            kv_cache_dtype:
              suffix: FP8
    mla_context_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM module NVFP4 GEMMs require Blackwell.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            gemm_type: nvfp4
    mla_generation_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM module NVFP4 GEMMs require Blackwell.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            gemm_type: nvfp4
    dsa_context_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM DSA FP8 KV-cache variants are Blackwell-only.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            kv_cache_dtype: fp8
    dsa_generation_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM DSA FP8 KV-cache variants are Blackwell-only.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            kv_cache_dtype: fp8
  vllm:
    moe:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM NVFP4 MoE is Blackwell-only.
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha]
          match:
            moe_type: nvfp4
        - reason_type: hardware_unsupported
          reason: SM90 H100/H200 does not support the FP4-only Nemotron MoE checkpoints, so their MoE silicon cases are not runnable for support-matrix healing.
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha]
          match:
            model_path:
              in:
                - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
                - nvidia/nemotron-ultra-rl-050826
    mla_context_module:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM module NVFP4 GEMMs require Blackwell.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            gemm_type: nvfp4
    mla_generation_module:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM module NVFP4 GEMMs require Blackwell.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            gemm_type: nvfp4
