name: "Accuracy Regression Testing"

# Demoted from a PR gate to a scheduled silicon-accuracy tracker; the blocking
# PR gate is now "Regression Gate V2" (regression-v2.yml), see
# docs/design/regression_test_v2_design.md. Scheduled runs compare main HEAD
# against the most recent release tag as the trend anchor.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      old-ref:
        description: "Old revision to compare against (default: latest release tag)"
        required: false
        default: ""
        type: string

jobs:
  accuracy-regression-testing:
    name: AIC Accuracy Regression Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout incoming revision
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Git LFS Pull
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e src/aiconfigurator-core
          python -m pip install -e ".[dev]"

      - name: Resolve old revision
        id: old-ref
        run: |
          OLD_REF="${{ inputs.old-ref }}"
          if [ -z "${OLD_REF}" ]; then
            OLD_REF="$(git describe --tags --abbrev=0 2>/dev/null || echo main)"
          fi
          echo "old_ref=${OLD_REF}" >> "$GITHUB_OUTPUT"
          echo "Comparing old revision ${OLD_REF} against incoming revision $(git rev-parse HEAD)"

      - name: Create old revision worktree
        run: |
          git worktree add --detach ../aiconfigurator-old "${{ steps.old-ref.outputs.old_ref }}"

      - name: Install old revision dependencies
        run: |
          OLD_ROOT="${{ github.workspace }}/../aiconfigurator-old"
          OLD_VENV="${OLD_ROOT}/.venv"
          python -m venv "${OLD_VENV}"
          "${OLD_VENV}/bin/python" -m pip install --upgrade pip
          if [ -f "${OLD_ROOT}/src/aiconfigurator-core/pyproject.toml" ]; then
            "${OLD_VENV}/bin/python" -m pip install -e "${OLD_ROOT}/src/aiconfigurator-core"
          fi
          "${OLD_VENV}/bin/python" -m pip install -e "${OLD_ROOT}"

      - name: Generate new predictions
        run: |
          mkdir -p tools/accuracy_regression_testing/results
          PYTHONPATH=src python tools/accuracy_regression_testing/predict_silicon_sample.py \
            --aic-output-prefix new \
            > tools/accuracy_regression_testing/results/silicon_result_new.csv \
            2> tools/accuracy_regression_testing/results/new_predictions.log

      - name: Generate old predictions
        run: |
          OLD_ROOT="${{ github.workspace }}/../aiconfigurator-old"
          OLD_VENV="${OLD_ROOT}/.venv"
          RESULTS="${{ github.workspace }}/tools/accuracy_regression_testing/results"
          cd "${OLD_ROOT}"
          PYTHONPATH="${OLD_ROOT}/src" \
            "${OLD_VENV}/bin/python" tools/accuracy_regression_testing/predict_silicon_sample.py \
              "${RESULTS}/silicon_result_new.csv" \
              --aic-output-prefix old \
              > "${RESULTS}/silicon_result.csv" \
              2> "${RESULTS}/old_predictions.log"

      - name: Compare predictions
        run: |
          python tools/accuracy_regression_testing/compare_silicon_predictions.py \
            tools/accuracy_regression_testing/results/silicon_result.csv \
            --output tools/accuracy_regression_testing/results/comparison_summary.csv \
            --plot-output tools/accuracy_regression_testing/results/comparison_plot.png

      - name: Run regression gate
        # Allow-to-fail: AIC's overall accuracy is still under active
        # development with many compensating modeling gaps, so any individual
        # correction can move the aggregate prediction further from silicon
        # (because previously-cancelling errors stop cancelling). Reviewers
        # should still inspect the comparison summary / PR comment uploaded
        # below — this just stops the threshold breach from blocking merges.
        continue-on-error: true
        run: |
          python -m pytest tools/accuracy_regression_testing/test_regression_thresholds.py -q

      - name: Upload regression artifacts
        id: upload-regression-artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accuracy-regression-testing-results
          path: |
            tools/accuracy_regression_testing/results/silicon_result_new.csv
            tools/accuracy_regression_testing/results/silicon_result.csv
            tools/accuracy_regression_testing/results/comparison_summary.csv
            tools/accuracy_regression_testing/results/comparison_plot.png
            tools/accuracy_regression_testing/results/new_predictions.log
            tools/accuracy_regression_testing/results/old_predictions.log
          if-no-files-found: ignore

      - name: Add summary
        if: always()
        run: |
          echo "## AIC Accuracy Regression Testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Old revision: \`${{ steps.old-ref.outputs.old_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Incoming revision: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f tools/accuracy_regression_testing/results/comparison_summary.csv ]; then
            echo "### Comparison Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```csv' >> "$GITHUB_STEP_SUMMARY"
            cat tools/accuracy_regression_testing/results/comparison_summary.csv >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Comparison summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
