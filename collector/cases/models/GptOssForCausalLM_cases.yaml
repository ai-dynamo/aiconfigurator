schema_version: 1
architecture: GptOssForCausalLM
model_path: openai/gpt-oss-120b
model_paths:
  - openai/gpt-oss-120b
  - openai/gpt-oss-20b
include_base: true
description: >
  GPT-OSS MoE model-centric collection plan.

model_case_values:
  moe:
    - model_path: openai/gpt-oss-120b
      hidden_size: 2880
      inter_size: 2880
      topk: 4
      num_experts: 128
      framework_quantization:
        vllm:
          allowed_modes:
            - w4a16_mxfp4
          module_config:
            w4a16_mxfp4:
              has_bias: true
              activation: swigluoai
        vllm_xpu:
          allowed_modes:
            - w4a16_mxfp4
      framework_cases:
        vllm_xpu:
          sweep: full
          activation: swigluoai
    - model_path: openai/gpt-oss-20b
      hidden_size: 2880
      inter_size: 2880
      topk: 4
      num_experts: 32
      framework_quantization:
        vllm:
          allowed_modes:
            - w4a16_mxfp4
          module_config:
            w4a16_mxfp4:
              has_bias: true
              activation: swigluoai
        vllm_xpu:
          allowed_modes:
            - w4a16_mxfp4
      framework_cases:
        vllm_xpu:
          sweep: full
          activation: swigluoai

all_frameworks_op_cases:
  moe:
    cases: all
