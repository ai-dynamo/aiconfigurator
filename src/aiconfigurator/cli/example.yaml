# Experiment YAML format (flat).  Keys under each experiment match
# aiconfigurator.sdk.task_config.Task field names directly.  Disagg
# experiments use the `prefill_*` / `decode_*` prefixes for role-specific
# fields; shared workload fields (isl, osl, ttft, tpot, total_gpus, ...) stay
# at the top level.

# Define your experiments here; "exps" controls execution order.  If "exps"
# is omitted, every top-level mapping is executed in declaration order.
exps:
  - exp_agg_full
  - exp_agg_simplified
  - exp_disagg_full
  - exp_disagg_simplified


# --- Aggregated, full template -----------------------------------------------
exp_agg_full:
  serving_mode: agg                                  # required
  total_gpus: 8                                      # required
  isl: 4000
  osl: 1000
  prefix: 0
  ttft: 1000.0
  tpot: 40.0

  # Worker spec
  model_path: deepseek-ai/DeepSeek-V3                # required, HF ID or local path
  system_name: h200_sxm                              # required
  backend_name: trtllm                               # default trtllm
  backend_version: 1.2.0rc5                          # optional, default = latest in DB
  database_mode: SILICON                             # SILICON | HYBRID | EMPIRICAL | SOL | SOL_FULL
  enable_wideep: false
  nextn: 1                                           # MTP draft tokens, 0 disables
  nextn_accept_rates: [0.85, 0, 0, 0, 0]

  # Quantization (omit for defaults)
  gemm_quant_mode: fp8_block                         # fp8 | fp8_block | bfloat16 | ...
  moe_quant_mode: fp8_block
  kvcache_quant_mode: bfloat16
  fmha_quant_mode: bfloat16
  comm_quant_mode: half

  # Search space (omit for defaults derived from is_moe + system)
  agg_num_gpu_candidates: [4, 8]
  agg_tp_candidates: [1, 2, 4, 8]
  agg_pp_candidates: [1]
  agg_dp_candidates: [1, 2, 4, 8]
  agg_moe_tp_candidates: [1]
  agg_moe_ep_candidates: [1, 2, 4, 8]


# --- Aggregated, minimal -----------------------------------------------------
exp_agg_simplified:
  serving_mode: agg
  total_gpus: 8
  model_path: deepseek-ai/DeepSeek-V3
  system_name: h200_sxm


# --- Disaggregated, full template -------------------------------------------
exp_disagg_full:
  serving_mode: disagg                               # required
  total_gpus: 32                                     # required
  isl: 4000
  osl: 1000
  prefix: 0
  ttft: 1000.0
  tpot: 40.0

  # Disagg prefill role
  prefill_model_path: deepseek-ai/DeepSeek-V3
  prefill_system_name: h200_sxm
  prefill_backend_name: trtllm
  prefill_backend_version: 1.2.0rc5
  prefill_enable_wideep: false
  prefill_gemm_quant_mode: fp8_block
  prefill_moe_quant_mode: fp8_block
  prefill_kvcache_quant_mode: bfloat16
  prefill_fmha_quant_mode: bfloat16
  prefill_comm_quant_mode: half
  prefill_num_gpu_candidates: [4, 8]
  prefill_tp_candidates: [1, 2, 4, 8]
  prefill_pp_candidates: [1]
  prefill_dp_candidates: [1]
  prefill_moe_tp_candidates: [1]
  prefill_moe_ep_candidates: [1, 2, 4, 8]

  # Disagg decode role
  decode_model_path: deepseek-ai/DeepSeek-V3
  decode_system_name: h200_sxm                       # may differ from prefill
  decode_backend_name: trtllm
  decode_backend_version: 1.2.0rc5
  decode_enable_wideep: false
  decode_gemm_quant_mode: fp8_block
  decode_moe_quant_mode: fp8_block
  decode_kvcache_quant_mode: bfloat16
  decode_fmha_quant_mode: bfloat16
  decode_comm_quant_mode: half
  decode_num_gpu_candidates: [4, 8]
  decode_tp_candidates: [1, 2, 4, 8]
  decode_pp_candidates: [1]
  decode_dp_candidates: [1, 2, 4, 8]
  decode_moe_tp_candidates: [1]
  decode_moe_ep_candidates: [1, 2, 4, 8]

  # MTP shared across roles
  nextn: 1
  nextn_accept_rates: [0.85, 0, 0, 0, 0]

  # Orchestration (optional)
  prefill_max_batch_size: 1
  decode_max_batch_size: 512
  prefill_latency_correction: 1.1
  decode_latency_correction: 1.08


# --- Disaggregated, minimal -------------------------------------------------
exp_disagg_simplified:
  serving_mode: disagg
  total_gpus: 32
  prefill_model_path: deepseek-ai/DeepSeek-V3
  prefill_system_name: h200_sxm
  decode_model_path: deepseek-ai/DeepSeek-V3
  decode_system_name: h200_sxm
