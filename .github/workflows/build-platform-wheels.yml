name: Build platform wheels

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - ".github/workflows/build-platform-wheels.yml"
      - "docker/Dockerfile"
      - "pyproject.toml"
      - "aic-core/**"
      - "src/**"
      - "tools/build_legacy_monolith_fixture.py"
      - "tools/verify_installed_package_layers.py"
      - "tools/verify_release_wheels.py"
  push:
    branches:
      - main
      - "release/*"
    paths:
      - ".github/workflows/build-platform-wheels.yml"
      - "docker/Dockerfile"
      - "pyproject.toml"
      - "aic-core/**"
      - "src/**"
      - "tools/build_legacy_monolith_fixture.py"
      - "tools/verify_installed_package_layers.py"
      - "tools/verify_release_wheels.py"
  workflow_dispatch:

concurrency:
  group: platform-wheels-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build wheels (${{ matrix.platform_name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: manylinux_2_28_x86_64
            runner: ubuntu-24.04
            build_method: docker
            platform: linux/amd64
            wheel_base: quay.io/pypa/manylinux_2_28_x86_64
            upload_upper: true
          - platform_name: manylinux_2_28_aarch64
            runner: ubuntu-24.04-arm
            build_method: docker
            platform: linux/arm64
            wheel_base: quay.io/pypa/manylinux_2_28_aarch64
            upload_upper: false
          - platform_name: macosx_arm64
            runner: macos-14
            build_method: native-macos
            upload_upper: false
          - platform_name: win_amd64
            runner: windows-2022
            build_method: native-windows
            upload_upper: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          lfs: true
          fetch-depth: 0

      - name: Materialize Git LFS data
        run: git lfs pull

      - name: Set up Docker Buildx
        if: matrix.build_method == 'docker'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Linux wheel
        if: matrix.build_method == 'docker'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          target: wheel-out
          build-args: WHEEL_BUILD_BASE=${{ matrix.wheel_base }}
          outputs: type=local,dest=./wheelhouse

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Select Rust toolchain for macOS wheel
        if: matrix.build_method == 'native-macos'
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0

      - name: Build and verify macOS wheel
        if: matrix.build_method == 'native-macos'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          python -m pip install --quiet 'build>=1,<2' 'maturin>=1.12,<2' 'delocate>=0.13,<1'
          mkdir -p wheelhouse repaired-wheelhouse
          (cd aic-core && maturin build --release --out ../wheelhouse)
          python -m build --wheel --outdir wheelhouse
          delocate-wheel --wheel-dir repaired-wheelhouse --verbose wheelhouse/aiconfigurator_core-*.whl
          rm wheelhouse/aiconfigurator_core-*.whl
          mv repaired-wheelhouse/*.whl wheelhouse/
          python tools/verify_release_wheels.py wheelhouse

      - name: Select Rust toolchain for Windows wheel
        if: matrix.build_method == 'native-windows'
        shell: pwsh
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0

      - name: Build and verify Windows wheel
        if: matrix.build_method == 'native-windows'
        shell: pwsh
        run: |
          python -m pip install --quiet 'build>=1,<2' 'maturin>=1.12,<2'
          New-Item -ItemType Directory -Force wheelhouse | Out-Null
          Push-Location aic-core
          maturin build --release --out ../wheelhouse
          Pop-Location
          python -m build --wheel --outdir wheelhouse
          python tools/verify_release_wheels.py wheelhouse

      - name: Smoke-test native extension
        shell: bash
        run: |
          python -m pip install --quiet --no-deps \
            wheelhouse/aiconfigurator_core-*.whl \
            wheelhouse/aiconfigurator-*.whl
          python -c \
            'import aiconfigurator_core; assert aiconfigurator_core._build_smoke() == 1'

      - name: Upload wheel to Artifactory
        if: >-
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_PYPI_REPO_NAME: ${{ secrets.ARTIFACTORY_PYPI_REPO_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          : "${ARTIFACTORY_URL:?ARTIFACTORY_URL is not configured}"
          : "${ARTIFACTORY_TOKEN:?ARTIFACTORY_TOKEN is not configured}"
          : "${ARTIFACTORY_PYPI_REPO_NAME:?ARTIFACTORY_PYPI_REPO_NAME is not configured}"

          shopt -s nullglob
          wheels=(wheelhouse/aiconfigurator_core-*.whl)
          expected=1
          if [ "${{ matrix.upload_upper }}" = "true" ]; then
            wheels+=(wheelhouse/aiconfigurator-*.whl)
            expected=2
          fi
          if [ "${#wheels[@]}" -ne "${expected}" ]; then
            echo "::error::Did not find the expected core and upper wheels"
            exit 1
          fi

          subpath="aiconfigurator/post-merge/${GITHUB_SHA}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
          {
            echo "### Artifactory wheels"
            echo
            echo "- Platform: \`${{ matrix.platform_name }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          for wheel in "${wheels[@]}"; do
            filename="$(basename "${wheel}")"
            target="${ARTIFACTORY_URL%/}/${ARTIFACTORY_PYPI_REPO_NAME}/${subpath}/${filename}"
            curl --fail-with-body --show-error --silent \
              --connect-timeout 30 --max-time 900 \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --header "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
              --upload-file "${wheel}" \
              "${target}"
            echo "Uploaded ${filename} to ${subpath}/"
            echo "- Path: \`${subpath}/${filename}\`" >> "${GITHUB_STEP_SUMMARY}"
          done
