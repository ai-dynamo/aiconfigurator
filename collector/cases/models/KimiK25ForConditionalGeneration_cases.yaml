schema_version: 1
architecture: KimiK25ForConditionalGeneration
model_path: moonshotai/Kimi-K2.5
model_paths:
  - moonshotai/Kimi-K2-Instruct
  - moonshotai/Kimi-K2.5
  - nvidia/Kimi-K2.5-NVFP4
include_base: true
base_ops:
  - gemm
framework_specific_base_ops:
  vllm:
    - attention_context
    - attention_generation
description: >
  Kimi-K2.5 hybrid MLA/MoE model-centric collection plan.

model_case_values:
  attention:
    - id: kimi_k25_vllm_attention
      model_path: moonshotai/Kimi-K2.5
      model_aliases:
        - moonshotai/Kimi-K2-Instruct
        - nvidia/Kimi-K2.5-NVFP4
      num_attention_heads: 64
      num_key_value_heads: 64
      head_dim: 128
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
  moe:
    - model_path: moonshotai/Kimi-K2.5
      model_aliases:
        - moonshotai/Kimi-K2-Instruct
        - nvidia/Kimi-K2.5-NVFP4
      hidden_size: 7168
      inter_size: 2048
      topk: 8
      num_experts: 384
      wideep: true
  mla:
    - model_path: moonshotai/Kimi-K2.5
      model_aliases:
        - moonshotai/Kimi-K2-Instruct
        - nvidia/Kimi-K2.5-NVFP4
      # The current SGLang/TRT-LLM AIC MLA consumer queries the historical
      # DeepSeek-compatible 128-head table. vLLM's native 64-head attention
      # shape is represented separately by the attention profile above.
      num_heads: 128
      q_lora_rank: 1536
      kv_lora_rank: 512
      qk_nope_head_dim: 128
      qk_rope_head_dim: 64
      v_head_dim: 128
    # Preserve the V1 n=64 sweep. Populate-time local-head dedup keeps only
    # the one extra physical anchor not already produced by n=128.
    - model_path: moonshotai/Kimi-K2.5
      model_aliases:
        - moonshotai/Kimi-K2-Instruct
        - nvidia/Kimi-K2.5-NVFP4
      num_heads: 64
      q_lora_rank: 1536
      kv_lora_rank: 512
      qk_nope_head_dim: 128
      qk_rope_head_dim: 64
      v_head_dim: 128

all_frameworks_op_cases:
  moe:
    cases: all

framework_specific_op_cases:
  trtllm:
    mla_context:
      rules:
        - fields: [input_len, batch_size, output_len, kv_cache_dtype, num_heads, world_size, tp_size, tokens_per_block, warming_up, test_ite, is_context_phase]
          match:
            tp_size:
              in: [1, 2, 4, 8]
    mla_generation:
      rules:
        - fields: [input_len, batch_size, output_len, kv_cache_dtype, num_heads, world_size, tp_size, tokens_per_block, warming_up, test_ite, is_context_phase]
          match:
            tp_size:
              in: [1, 2, 4, 8]
    mla_bmm_gen_pre:
      rules:
        - fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            num_heads:
              in: [64, 32, 16, 8]
    mla_bmm_gen_post:
      rules:
        - fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            num_heads:
              in: [64, 32, 16, 8]
    trtllm_moe_wideep:
      cases: all
  sglang:
    mla_context:
      rules:
        - fields: [input_len, batch_size, output_len, kv_cache_dtype, num_heads, world_size, tp_size, tokens_per_block, warming_up, test_ite, is_context_phase]
          match:
            tp_size:
              in: [1, 2, 4, 8]
    mla_generation:
      rules:
        - fields: [input_len, batch_size, output_len, kv_cache_dtype, num_heads, world_size, tp_size, tokens_per_block, warming_up, test_ite, is_context_phase]
          match:
            tp_size:
              in: [1, 2, 4, 8]
    mla_bmm_gen_pre:
      rules:
        - fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            num_heads:
              in: [64, 32, 16, 8]
    mla_bmm_gen_post:
      rules:
        - fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            num_heads:
              in: [64, 32, 16, 8]
