# Complete agent experiment template.
#
# Copy this file, keep the experiment entries needed for the task, and edit the
# model/system/backend/workload/search fields. Keep database_mode as SILICON for
# any experiment that may drive final analysis, deployment sizing, or generated
# configs.
#
# Do not add quantization overrides by default. AIC can infer quantization from
# the model config and its backend defaults. Add explicit quant modes only for a
# requested quantization study or a known runtime requirement.

exps:
  - agg_template
  - disagg_template

agg_template:
  mode: patch
  serving_mode: agg
  model_path: Qwen/Qwen3-32B
  total_gpus: 8
  system_name: h200_sxm
  backend_name: trtllm
  # Omit backend_version to use the latest available silicon database for this
  # system/backend. Set it only when a specific silicon database version is
  # required.
  # backend_version: 1.3.0rc10
  database_mode: SILICON
  isl: 4000
  osl: 1000
  prefix: 0
  ttft: 2000.0
  tpot: 30.0
  # request_latency: 60000.0
  enable_wideep: false
  profiles: []
  config:
    # Add nextn only when the model and runtime are expected to use MTP.
    # nextn: 1
    # nextn_accept_rates: [0.85, 0.3, 0.0, 0.0, 0.0]
    worker_config:
      num_gpu_per_worker: [1, 2, 4, 8]
      tp_list: [1, 2, 4, 8]
      pp_list: [1]
      dp_list: [1]
      moe_tp_list: [1]
      moe_ep_list: [1]

disagg_template:
  mode: patch
  serving_mode: disagg
  model_path: Qwen/Qwen3-32B
  total_gpus: 16
  system_name: h200_sxm
  decode_system_name: h200_sxm
  backend_name: trtllm
  # backend_version: 1.3.0rc10
  database_mode: SILICON
  isl: 4000
  osl: 1000
  prefix: 0
  ttft: 2000.0
  tpot: 30.0
  # request_latency: 60000.0
  enable_wideep: false
  profiles: []
  config:
    # Add nextn only when the model and runtime are expected to use MTP.
    # nextn: 1
    # nextn_accept_rates: [0.85, 0.3, 0.0, 0.0, 0.0]
    prefill_worker_config:
      num_gpu_per_worker: [1, 2, 4, 8]
      tp_list: [1, 2, 4, 8]
      pp_list: [1]
      dp_list: [1]
      moe_tp_list: [1]
      moe_ep_list: [1]
    decode_worker_config:
      num_gpu_per_worker: [1, 2, 4, 8]
      tp_list: [1, 2, 4, 8]
      pp_list: [1]
      dp_list: [1]
      moe_tp_list: [1]
      moe_ep_list: [1]
    replica_config:
      num_gpu_per_replica: [1, 2, 4, 8, 16]
      max_gpu_per_replica: 128
      max_prefill_worker: 32
      max_decode_worker: 32
      max_prefill_gpus: null
      max_decode_gpus: null
    advanced_tuning_config:
      prefill_latency_correction_scale: 1.0
      decode_latency_correction_scale: 1.0
      prefill_max_batch_size: 1
      decode_max_batch_size: 512
