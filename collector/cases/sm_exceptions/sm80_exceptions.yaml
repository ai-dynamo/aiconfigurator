schema_version: 1
sm_version: 80
gpu_types:
  - a100_pcie
  - a100_sxm
  - a30
description: >
  SM80 Ampere exceptions extracted from collector SM gates. These rules mark
  quantized paths that current collectors intentionally do not emit on A100/A30.

framework_specific_op_exceptions:
  sglang:
    gemm:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang GEMM only emits BF16 on SM80; FP8, block-FP8, and NVFP4 paths require newer SMs.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type:
              in: [fp8, fp8_block, nvfp4]
    moe:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang block-FP8 MoE requires SM90+ shared-memory/TMA support; NVFP4 MoE requires Blackwell.
          fields: [moe_type, num_tokens, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha, swiglu_limit]
          match:
            moe_type:
              in: [fp8_block, nvfp4]
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 MoE collector does not support GPT-OSS MoE cases.
          fields: [moe_type, num_tokens, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha, swiglu_limit]
          match:
            model_path:
              in: [openai/gpt-oss-20b, openai/gpt-oss-120b]
    attention_context:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang FP8 KV-cache attention requires SM90+.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            use_fp8_kv_cache: true
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang FP8 KV-cache attention requires SM90+.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            use_fp8_kv_cache: true
    dsa_context_module:
      drop: true
      reason_type: hardware_unsupported
      reason: SGLang DSA/NSA module collectors require SM90+.
    dsa_generation_module:
      drop: true
      reason_type: hardware_unsupported
      reason: SGLang DSA/NSA module collectors require SM90+.
    mla_bmm_gen_pre:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang MLA BMM FP8 variants require SM89+.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
    mla_bmm_gen_post:
      rules:
        - reason_type: hardware_unsupported
          reason: SGLang MLA BMM FP8 variants require SM89+.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
  trtllm:
    gemm:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM GEMM FP8, block-FP8, and NVFP4 paths are not emitted on SM80.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type:
              in: [fp8, fp8_block, nvfp4]
    compute_scale:
      drop: true
      reason_type: hardware_unsupported
      reason: compute_scale measures FP8 quantization overhead and is only collected for SM > 86.
    moe:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM quantized MoE variants require Ada/Hopper or Blackwell capabilities.
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, min_latency_mode, model_path, token_expert_distribution, power_law_alpha]
          match:
            moe_type:
              in: [fp8, fp8_block, nvfp4, w4a16_mxfp4, w4a8_mxfp4_mxfp8]
    attention_context:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM FP8 KV-cache/context FMHA cases require SM > 86.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            use_fp8_kv_cache: true
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM FP8 KV-cache cases require SM > 86.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          match:
            use_fp8_kv_cache: true
    mla_bmm_gen_pre:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA BMM FP8 variants are only emitted for 86 < SM < 100.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
    mla_bmm_gen_post:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA BMM FP8 variants are only emitted for 86 < SM < 100.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
  vllm:
    gemm:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM GEMM FP8, block-FP8, and NVFP4 paths are not emitted on SM80.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type:
              in: [fp8, fp8_block, nvfp4]
    moe:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM quantized MoE variants require Ada/Hopper or Blackwell capabilities.
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha]
          match:
            moe_type:
              in: [fp8, fp8_block, nvfp4]
    attention_context:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM FP8 KV-cache cases require SM > 86.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, is_context_phase, window_size]
          match:
            use_fp8_kv_cache: true
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM FP8 KV-cache cases require SM > 86.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, is_context_phase, window_size]
          match:
            use_fp8_kv_cache: true
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.22."]
          reason: vLLM 0.22 FlashInfer generation attention on SM80 rejects head_dim=512 BF16 decode shapes with FlashInfer invalid configuration.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, is_context_phase, window_size]
          match:
            head_dim: 512
