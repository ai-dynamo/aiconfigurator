schema_version: 1
sm_version: 100
gpu_types:
  - b200_sxm
  - gb200
description: >
  SM100 datacenter Blackwell exceptions extracted from collector shape guards.
  Most quantized paths are supported; remaining skips are kernel-shape limits.

framework_specific_op_exceptions:
  sglang:
    gemm:
      rules:
        - reason_type: framework_version_unsupported
          reason: >
            SGLang 0.5.12.post2.dev454+ge958f4561 can hang indefinitely on
            B300/SM100 for this tiny-M FP8 GEMM shape; skip it so the collector
            can finish and report the missing row as an expected SM exception.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type: fp8
            token_count: 5
            output_features: 256
            input_features: 65536
  trtllm:
    mla_bmm_gen_pre:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA BMM FP8 variants are only emitted for 86 < SM < 100.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
    mla_bmm_gen_post:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA BMM FP8 variants are only emitted for 86 < SM < 100.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
    mla_context_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA module FP8 KV-cache variants are Hopper-only; Blackwell FP8 KV applies to DSA.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            attn_type: mla
            kv_cache_dtype: fp8
    mla_generation_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA module FP8 KV-cache variants are Hopper-only; Blackwell FP8 KV applies to DSA.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            attn_type: mla
            kv_cache_dtype: fp8
    attention_context:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM Blackwell attention kernels reject GQA ratios >= 32 unless the ratio is a multiple of 32.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          conditions:
            - ratio:
                numerator: num_heads
                denominator: num_key_value_heads
                gte: 32
                mod_ne: [32, 0]
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM Blackwell attention kernels reject GQA ratios >= 32 unless the ratio is a multiple of 32.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          conditions:
            - ratio:
                numerator: num_heads
                denominator: num_key_value_heads
                gte: 32
                mod_ne: [32, 0]
    moe:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["1.3.0rc10"]
          reason: TRT-LLM 1.3.0rc10 SM100 CutlassFusedMoE rejects plain W4A16/int4_wo in create_moe with ValueError Unsupported quantization mode [1].
          fields: [moe_type, num_tokens_list, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, min_latency_mode, model_path, token_expert_distribution, power_law_alpha]
          match:
            moe_type: int4_wo
  vllm:
    gemm:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM Blackwell block-FP8 GEMM requires token_count to be divisible by 4.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type: fp8_block
            token_count:
              mod_ne: [4, 0]
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM Blackwell FlashInfer/TRT-LLM batch decode supports GQA ratio <= 16.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, is_context_phase, window_size]
          conditions:
            - ratio:
                numerator: num_heads
                denominator: num_key_value_heads
                gt: 16

known_exceptions:
  - framework: sglang
    op: dsa_generation_module
    reason_type: framework_version_unsupported
    source: collector/sglang/collect_mla_module.py
    case_fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type, attention_backend]
    reason: >
      On B200/SM100, SGLang DSv3.2 DSA generation with reduced heads (<= 32)
      and kv_cache_length >= 256 can SIGABRT from an async CUDA illegal memory
      access in the collector's dummy-weight setup. The collector keeps the
      top-level case but drops only inner seq_len >= 256 shapes.
    match:
      model_path: deepseek-ai/DeepSeek-V3.2
      attn_type: dsa
      num_heads_lte: 32
      inner_seq_len_gte: 256
