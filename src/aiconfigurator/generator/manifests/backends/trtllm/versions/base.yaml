backend: trtllm
version: base
# Facts for the UNVERSIONED fallback template (extra_engine_args.yaml.j2),
# which the renderer selects when no backend version is requested (or the
# requested version string is unparseable). This file is loaded explicitly by
# builders/trtllm_engine_config.py; 'base' is not a parseable version, so the
# loader's floor-matching never selects it for a concrete version request.
builder_facts:
  # {{ num_nextn_predict_layers }} read from the top-level context.
  num_nextn_source: top_level
  # {{ ServiceConfig.print_iter_log | default(false) }} — nested lookup.
  print_iter_log_source: service_config
