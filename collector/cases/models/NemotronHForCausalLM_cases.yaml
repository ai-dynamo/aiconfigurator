schema_version: 1
architecture: NemotronHForCausalLM
model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
model_paths:
  - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
  - nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
  - nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-FP8
  - nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
  - nvidia/Nemotron-H-56B-Base-8K
  - nvidia/nemotron-ultra-rl-050826
include_base: true
description: >
  Nemotron-H hybrid Mamba/MoE model-centric collection plan.

model_case_values:
  moe:
    - model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      hidden_size: 2688
      inter_size: 1856
      topk: 6
      num_experts: 128
      framework_quantization:
        sglang:
          allowed_modes: [bfloat16]
        trtllm:
          allowed_modes: [bfloat16]
        vllm:
          allowed_modes: [bfloat16]
    - model_path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      hidden_size: 4096
      inter_size: 2688
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: [nvfp4]
        trtllm:
          allowed_modes: [nvfp4]
        vllm:
          # vLLM's pinned FlashInfer NVFP4 path is limited to top-k <= 10.
          allowed_modes: []
    - model_path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      hidden_size: 1024
      inter_size: 2688
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: [nvfp4]
        trtllm:
          allowed_modes: [nvfp4]
        vllm:
          allowed_modes: []
    # Ultra's 8192-wide profiles remain available to SGLang/TRT-LLM. vLLM
    # 0.24 prunes them in its getter because FusedMoE uses moe_latent_size=2048.
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
      hidden_size: 8192
      inter_size: 5120
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: [bfloat16]
        trtllm:
          allowed_modes: [bfloat16]
        vllm:
          allowed_modes: [bfloat16]
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
      hidden_size: 2048
      inter_size: 5120
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: [bfloat16]
        trtllm:
          allowed_modes: [bfloat16]
        vllm:
          allowed_modes: [bfloat16]
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-FP8
      hidden_size: 8192
      inter_size: 5120
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: []
        trtllm:
          allowed_modes: [fp8]
        vllm:
          allowed_modes: [fp8]
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-FP8
      hidden_size: 2048
      inter_size: 5120
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: []
        trtllm:
          allowed_modes: [fp8]
        vllm:
          allowed_modes: [fp8]
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
      hidden_size: 8192
      inter_size: 5120
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: [nvfp4]
        trtllm:
          allowed_modes: [nvfp4]
        vllm:
          allowed_modes: []
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
      hidden_size: 2048
      inter_size: 5120
      topk: 22
      num_experts: 512
      framework_quantization:
        sglang:
          allowed_modes: [nvfp4]
        trtllm:
          allowed_modes: [nvfp4]
        vllm:
          allowed_modes: []
  mamba2:
    - model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      d_model: 2688
      d_state: 128
      d_conv: 4
      nheads: 64
      head_dim: 64
      n_groups: 8
      chunk_size: 128
    - model_path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      d_model: 4096
      d_state: 128
      d_conv: 4
      nheads: 128
      head_dim: 64
      n_groups: 8
      chunk_size: 128
    - model_path: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
      model_aliases:
        - nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
        - nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-FP8
        - nvidia/nemotron-ultra-rl-050826
      d_model: 8192
      d_state: 128
      d_conv: 4
      nheads: 256
      head_dim: 64
      n_groups: 8
      chunk_size: 128
    - model_path: nvidia/Nemotron-H-56B-Base-8K
      d_model: 8192
      d_state: 256
      d_conv: 4
      nheads: 256
      head_dim: 64
      n_groups: 8
      chunk_size: 128

all_frameworks_op_cases:
  moe:
    cases: all

framework_specific_op_cases:
  trtllm:
    mamba2:
      cases: all
