profiles:
  h100:
    node_selector:
      nvidia.com/gpu.product: NVIDIA-H100-SXM5-80GB
    arch: x86_64
    nccl_env:
      NCCL_CUMEM_ENABLE: '1'
    shared_memory:
      default: 64Gi
    tolerations: []
    moe_backend:
      trtllm: CUTLASS
  h200:
    node_selector:
      nvidia.com/gpu.product: NVIDIA-H200
    arch: x86_64
    nccl_env:
      NCCL_CUMEM_ENABLE: '1'
    shared_memory:
      default: 64Gi
    tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: 'true'
      effect: NoSchedule
    moe_backend:
      trtllm: CUTLASS
  b200:
    node_selector:
      nvidia.com/gpu.product: NVIDIA-B200
    arch: x86_64
    nccl_env:
      NCCL_CUMEM_ENABLE: '1'
    shared_memory:
      default: 64Gi
    tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    moe_backend:
      trtllm: WIDEEP
      sglang: deepep_moe
  gb200:
    node_selector:
      kubernetes.io/arch: arm64
      nvidia.com/gpu.product: NVIDIA-GB200
    arch: arm64
    tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: kubernetes.io/arch
      operator: Equal
      value: arm64
      effect: NoSchedule
    nccl_env:
      NCCL_CUMEM_ENABLE: '1'
      NCCL_MNNVL_ENABLE: '1'
      NCCL_NVLS_ENABLE: '1'
      NCCL_P2P_LEVEL: NVL
      UCX_CUDA_IPC_ENABLE_MNNVL: y
      VLLM_USE_NCCL_SYMM_MEM: '1'
    shared_memory:
      default: 64Gi
      disagg_decode: 128Gi
    moe_backend:
      trtllm: WIDEEP
      sglang: deepep_moe
  b60:
    node_selector:
      gpu.intel.com/family: b60
    arch: x86_64
    shared_memory:
      default: 16Gi
    tolerations: []
  h20:
    node_selector:
      nvidia.com/gpu.product: NVIDIA-H20-3e
    arch: x86_64
    nccl_env:
      NCCL_CUMEM_ENABLE: '1'
    shared_memory:
      default: 64Gi
    tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: 'true'
      effect: NoSchedule
    moe_backend:
      trtllm: CUTLASS
