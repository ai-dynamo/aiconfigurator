schema_version: 1
architecture: MiMoV2FlashForCausalLM
model_path: XiaomiMiMo/MiMo-V2-Flash
model_paths:
  - XiaomiMiMo/MiMo-V2-Flash
include_base: true
base_ops:
  - gemm
framework_specific_base_ops:
  # vLLM 0.24 uses DiffKV (QK=192, V=128, plus sinks). The persisted generic
  # attention schema cannot represent that path, so vLLM intentionally omits it.
  sglang:
    - attention_context
    - attention_generation
  trtllm:
    - attention_context
    - attention_generation
  vllm_xpu:
    - attention_context
    - attention_generation
description: >
  MiMo-V2-Flash hybrid model-centric collection plan. Starts with shared base
  cases and includes the hybrid MoE shape used by the support matrix.

model_case_values:
  attention:
    - id: mimo_v2_global_attention
      model_path: XiaomiMiMo/MiMo-V2-Flash
      num_attention_heads: 64
      num_key_value_heads: 4
      head_dim: 192
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
    - id: mimo_v2_swa_attention
      model_path: XiaomiMiMo/MiMo-V2-Flash
      num_attention_heads: 64
      num_key_value_heads: 8
      head_dim: 192
      window_size: 128
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
  moe:
    - model_path: XiaomiMiMo/MiMo-V2-Flash
      hidden_size: 4096
      inter_size: 2048
      topk: 8
      num_experts: 256

all_frameworks_op_cases:
  moe:
    cases: all
