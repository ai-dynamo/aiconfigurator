schema_version: 1
architecture: MiMoV2FlashForCausalLM
model_path: XiaomiMiMo/MiMo-V2-Flash
model_paths:
  - XiaomiMiMo/MiMo-V2-Flash
include_base: true
description: >
  MiMo-V2-Flash hybrid model-centric collection plan. Starts with shared base
  cases; hybrid-MoE-specific collectors can be added here when they land.

model_case_values:
  moe:
    - model_path: XiaomiMiMo/MiMo-V2-Flash
      hidden_size: 4096
      inter_size: 2048
      topk: 8
      num_experts: 256

all_frameworks_op_cases:
  moe:
    cases: all

framework_specific_op_cases:
  sglang:
    attention_context:
      cases:
        - id: base_attention_context_shape_sweep
          batch_sizes: [1, 2]
          sequence_lengths: [128, 256]
          query_head_counts: [8, 16, 32, 64]
          kv_head_options: [1, 2, 4, 8]
          head_dims: [192]
          window_sizes: [0, 128]
    attention_generation:
      cases:
        - id: base_attention_generation_shape_sweep
          batch_sizes: [1, 2, 4, 8]
          sequence_lengths: [2, 129, 257, 385]
          mha_query_head_counts: [8, 16, 32, 64]
          xqa_query_head_counts: [8, 16, 32, 64]
          kv_head_counts: [1, 2, 4, 8]
          head_dims: [192]
          window_sizes: [0, 128]
          min_batch_options_per_sequence: 1
  vllm:
    attention_context:
      cases:
        - id: base_attention_context_shape_sweep
          batch_sizes: [1, 2]
          sequence_lengths: [128, 256]
          query_head_counts: [8, 16, 32, 64]
          kv_head_options: [1, 2, 4, 8]
          head_dims: [192]
          window_sizes: [0, 128]
    attention_generation:
      cases:
        - id: base_attention_generation_shape_sweep
          batch_sizes: [1, 2, 4, 8]
          sequence_lengths: [2, 129, 257, 385]
          mha_query_head_counts: [8, 16, 32, 64]
          xqa_query_head_counts: [8, 16, 32, 64]
          kv_head_counts: [1, 2, 4, 8]
          head_dims: [192]
          window_sizes: [0, 128]
          min_batch_options_per_sequence: 1
