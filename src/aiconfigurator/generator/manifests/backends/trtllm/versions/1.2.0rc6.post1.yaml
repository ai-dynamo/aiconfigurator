backend: trtllm
version: 1.2.0rc6.post1
flags: {}
# Which carrier each parameter rides for this version family (design §9.2).
# Recorded from backend_templates/trtllm/extra_engine_args.1.2.0rc6.post1.yaml.j2
# (engine_yaml = top-level keys of the engine YAML) and cli_args.j2
# (cli_override = params emitted as direct dynamo.trtllm argparser flags;
# this family has NO --override-engine-args — engine params ride the YAML).
parameter_carriers:
  engine_yaml:
    - backend
    - moe_expert_parallel_size
    - moe_tensor_parallel_size
    - moe_config
    - tensor_parallel_size
    - pipeline_parallel_size
    - enable_attention_dp
    - enable_chunked_prefill
    - max_batch_size
    - max_num_tokens
    - max_seq_len
    - kv_cache_config
    - cache_transceiver_config
    - cuda_graph_config
    - disable_overlap_scheduler
    - print_iter_log
    - speculative_config
  cli_override:
    - tensor_parallel_size
    - pipeline_parallel_size
    - moe_expert_parallel_size
    - enable_attention_dp
    - max_batch_size
    - max_num_tokens
    - max_seq_len
    - kv_cache_free_gpu_memory_fraction
# Variable-source facts consumed by builders/trtllm_engine_config.py.
# This is the coverage FLOOR of the typed builder: every trtllm version
# reachable from the active Dynamo releases (backend_version_matrix.yaml)
# floor-matches this file or a higher anchor. The 1.2.0rc6.post1 template is
# semantically identical to 1.3.0rc1 (comment-only diffs), so the facts match.
builder_facts:
  # speculative_config.num_nextn_predict_layers rides the top-level context:
  # {{ num_nextn_predict_layers }}.
  num_nextn_source: top_level
  # {{ print_iter_log | default(false) }} read from the top-level context.
  print_iter_log_source: top_level
