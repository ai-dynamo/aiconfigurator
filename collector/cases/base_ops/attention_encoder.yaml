schema_version: 1
op: encoder_attention
description: Base collector v2 cases for encoder_attention (non-causal / encoder attention).
all_frameworks_op_cases:
  encoder_attention:
    cases:
    - id: base_attention_encoder_shape_sweep
      description: 'Encoder (non-causal) attention shapes for multimodal ViT / audio encoders. MHA only, bf16 only.

        '
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      sequence_lengths:
      # Keep the original PR #1092 hardcoded collector grid (13/26/52/104)
      # as protected physical coverage. The final squash added sequence 1;
      # it remains a useful current-grid addition rather than a replacement.
      - 1
      - 13
      - 16
      - 26
      - 32
      - 52
      - 64
      - 104
      - 128
      - 192
      - 256
      - 400
      - 512
      - 576
      - 1024
      - 1296
      - 1500
      - 1536
      - 2048
      - 2304
      - 3072
      - 3136
      - 4096
      - 5184
      - 6144
      - 6400
      - 7744
      - 8192
      - 9216
      - 10240
      - 10816
      - 12288
      - 12544
      - 14400
      - 16384
      - 24576
      - 32768
      - 49152
      - 65536
      head_counts:
      - 2
      - 4
      - 5
      - 8
      - 10
      - 12
      - 14
      - 16
      - 20
      - 24
      - 32
      head_dims:
      - 64
      - 72
      - 80
      # Preserve the initial hardcoded encoder collector's physical grid for
      # full/raw collection. A targeted model with an encoder profile replaces
      # this broad grid with its native ViT topology.
      legacy_head_profiles:
      - id: encoder_initial_baseline
        head_counts: [2, 4, 5, 8, 10, 12, 14, 16, 20, 24, 32]
        head_dims: [64, 72, 80]
