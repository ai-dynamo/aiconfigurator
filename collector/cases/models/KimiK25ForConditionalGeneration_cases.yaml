schema_version: 1
architecture: KimiK25ForConditionalGeneration
model_path: moonshotai/Kimi-K2.5
model_paths:
  - moonshotai/Kimi-K2-Instruct
  - moonshotai/Kimi-K2.5
  - nvidia/Kimi-K2.5-NVFP4
include_base: true
description: >
  Kimi-K2.5 hybrid MLA/MoE model-centric collection plan.

model_case_values:
  moe:
    - model_paths:
        - moonshotai/Kimi-K2-Instruct
        - moonshotai/Kimi-K2.5
        - nvidia/Kimi-K2.5-NVFP4
      hidden_size: 7168
      inter_size: 2048
      topk: 8
      num_experts: 384
      wideep: true
  mla:
    - model_paths:
        - moonshotai/Kimi-K2.5
        - nvidia/Kimi-K2.5-NVFP4
      num_heads: 64
      q_lora_rank: 1536
      kv_lora_rank: 512
      qk_nope_head_dim: 128
      qk_rope_head_dim: 64
      v_head_dim: 128

all_frameworks_op_cases:
  moe:
    cases: all
  mla_context:
    cases: all
  mla_generation:
    cases: all

framework_specific_op_cases:
  trtllm:
    trtllm_moe_wideep:
      cases: all
