name: "Accuracy Regression Testing"

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:
    inputs:
      old-ref:
        description: "Old revision to compare against"
        required: false
        default: "main"
        type: string

jobs:
  accuracy-regression-testing:
    name: AIC Accuracy Regression Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout incoming revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Git LFS Pull
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Resolve old revision
        id: old-ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            OLD_REF="${{ github.event.pull_request.base.sha }}"
          else
            OLD_REF="${{ inputs.old-ref }}"
          fi
          echo "old_ref=${OLD_REF}" >> "$GITHUB_OUTPUT"
          echo "Comparing old revision ${OLD_REF} against incoming revision $(git rev-parse HEAD)"

      - name: Create old revision worktree
        run: |
          git worktree add --detach ../aiconfigurator-old "${{ steps.old-ref.outputs.old_ref }}"

      - name: Generate new predictions
        run: |
          mkdir -p tools/accuracy_regression_testing/results
          PYTHONPATH=src python tools/accuracy_regression_testing/predict_silicon_sample.py \
            --aic-output-prefix new \
            > tools/accuracy_regression_testing/results/silicon_result_new.csv \
            2> tools/accuracy_regression_testing/results/new_predictions.log

      - name: Generate old predictions
        run: |
          PYTHONPATH="${{ github.workspace }}/../aiconfigurator-old/src" \
            python tools/accuracy_regression_testing/predict_silicon_sample.py \
              tools/accuracy_regression_testing/results/silicon_result_new.csv \
              --aic-output-prefix old \
              > tools/accuracy_regression_testing/results/silicon_result.csv \
              2> tools/accuracy_regression_testing/results/old_predictions.log

      - name: Compare predictions
        run: |
          python tools/accuracy_regression_testing/compare_silicon_predictions.py \
            tools/accuracy_regression_testing/results/silicon_result.csv \
            --output tools/accuracy_regression_testing/results/comparison_summary.csv \
            --plot-output tools/accuracy_regression_testing/results/comparison_plot.png

      - name: Run regression gate
        run: |
          python -m pytest tools/accuracy_regression_testing/test_regression_thresholds.py -q

      - name: Upload regression artifacts
        id: upload-regression-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-regression-testing-results
          path: |
            tools/accuracy_regression_testing/results/silicon_result_new.csv
            tools/accuracy_regression_testing/results/silicon_result.csv
            tools/accuracy_regression_testing/results/comparison_summary.csv
            tools/accuracy_regression_testing/results/comparison_plot.png
            tools/accuracy_regression_testing/results/new_predictions.log
            tools/accuracy_regression_testing/results/old_predictions.log
          if-no-files-found: ignore

      - name: Add summary
        if: always()
        run: |
          echo "## AIC Accuracy Regression Testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Old revision: \`${{ steps.old-ref.outputs.old_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Incoming revision: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f tools/accuracy_regression_testing/results/comparison_summary.csv ]; then
            echo "### Comparison Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```csv' >> "$GITHUB_STEP_SUMMARY"
            cat tools/accuracy_regression_testing/results/comparison_summary.csv >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Comparison summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish comparison plot
        id: publish-plot
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          ARTIFACT_BRANCH: accuracy-regression-testing-artifacts
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ ! -f tools/accuracy_regression_testing/results/comparison_plot.png ]; then
            echo "plot_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ARTIFACT_DIR="$(mktemp -d)"
          ARTIFACT_PATH="accuracy-regression-testing/pr-${PR_NUMBER}/run-${GITHUB_RUN_ID}"

          if git ls-remote --exit-code --heads origin "${ARTIFACT_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${ARTIFACT_BRANCH}:${ARTIFACT_BRANCH}"
            git worktree add "${ARTIFACT_DIR}" "${ARTIFACT_BRANCH}"
          else
            git worktree add --detach "${ARTIFACT_DIR}"
            git -C "${ARTIFACT_DIR}" checkout --orphan "${ARTIFACT_BRANCH}"
            git -C "${ARTIFACT_DIR}" rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "${ARTIFACT_DIR}/${ARTIFACT_PATH}"
          cp tools/accuracy_regression_testing/results/comparison_plot.png "${ARTIFACT_DIR}/${ARTIFACT_PATH}/comparison_plot.png"

          git -C "${ARTIFACT_DIR}" config user.name "github-actions[bot]"
          git -C "${ARTIFACT_DIR}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${ARTIFACT_DIR}" lfs install --local
          git -C "${ARTIFACT_DIR}" lfs track "*.png"
          git -C "${ARTIFACT_DIR}" add .gitattributes "${ARTIFACT_PATH}/comparison_plot.png"

          if git -C "${ARTIFACT_DIR}" diff --cached --quiet; then
            echo "No plot changes to publish."
          else
            git -C "${ARTIFACT_DIR}" commit -m "chore: publish accuracy regression testing plot for PR ${PR_NUMBER}"
            git -C "${ARTIFACT_DIR}" push origin "${ARTIFACT_BRANCH}"
          fi

          PLOT_URL="https://media.githubusercontent.com/media/${GITHUB_REPOSITORY}/${ARTIFACT_BRANCH}/${ARTIFACT_PATH}/comparison_plot.png"
          echo "plot_url=${PLOT_URL}" >> "$GITHUB_OUTPUT"

      - name: Build PR comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          ARTIFACT_URL: ${{ steps.upload-regression-artifacts.outputs.artifact-url }}
          PLOT_URL: ${{ steps.publish-plot.outputs.plot_url }}
          OLD_REF: ${{ steps.old-ref.outputs.old_ref }}
        run: |
          python - <<'PY'
          import csv
          import os
          from pathlib import Path

          summary_path = Path("tools/accuracy_regression_testing/results/comparison_summary.csv")
          artifact_url = os.environ.get("ARTIFACT_URL", "")
          plot_url = os.environ.get("PLOT_URL", "")
          old_ref = os.environ.get("OLD_REF", "")
          marker = "<!-- aic-accuracy-regression-testing -->"

          lines = [
              marker,
              "## AIC Accuracy Regression Testing",
              "",
              f"Old revision: `{old_ref}`",
              "",
          ]
          if summary_path.exists():
              with summary_path.open(newline="") as f:
                  rows = list(csv.DictReader(f))
              headers = rows[0].keys() if rows else []
              all_row = next((row for row in rows if row.get("partition") == "all"), {})
              lines.append("### Summary")
              lines.append("")
              lines.append(f"- \\# samples added: {all_row.get('num_samples_added', 'N/A')}")
              lines.append(f"- ttft_mape_improvement_%: {all_row.get('ttft_mape_improvement_%', 'N/A')}")
              lines.append(f"- tpot_mape_improvement_%: {all_row.get('tpot_mape_improvement_%', 'N/A')}")
              lines.append("")
              lines.append("<details>")
              lines.append("<summary>Comparison summary table</summary>")
              lines.append("")
              if rows:
                  lines.append("| " + " | ".join(headers) + " |")
                  lines.append("| " + " | ".join(["---"] * len(headers)) + " |")
                  for row in rows:
                      lines.append("| " + " | ".join(row[h] for h in headers) + " |")
                  lines.append("")
              else:
                  lines.append("_Comparison summary is empty._")
                  lines.append("")
              lines.append("</details>")
              lines.append("")
          else:
              lines.append("_Comparison summary was not generated._")
              lines.append("")

          lines.extend([
              "<details>",
              "<summary>Comparison plot</summary>",
              "",
          ])
          if plot_url:
              lines.extend([
                  f"<img src=\"{plot_url}\" alt=\"AIC accuracy regression testing comparison plot\">",
                  "",
              ])
          lines.extend([
              f"Artifact bundle: [accuracy-regression-testing-results]({artifact_url})",
              "",
              "</details>",
              "",
          ])
          Path("pr_comment.md").write_text("\n".join(lines))
          PY

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MARKER="<!-- aic-accuracy-regression-testing -->"
          COMMENT_ID="$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n 1)"
          if [ -n "${COMMENT_ID}" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              --field body="$(cat pr_comment.md)"
          else
            gh pr comment "${PR_NUMBER}" --body-file pr_comment.md
          fi
