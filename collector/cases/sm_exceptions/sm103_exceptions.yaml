schema_version: 1
sm_version: 103
gpu_types:
  - b300_sxm
  - gb300
description: >
  SM103 datacenter Blackwell exceptions extracted from collector shape guards.
  This mirrors the SM100 kernel-shape restrictions, minus B200-only inner-loop
  DSA generation workarounds.

framework_specific_op_exceptions:
  sglang:
    gemm:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.12"]
          reason: SGLang 0.5.12 DeepGEMM block-FP8 GEMM raises CUDA invalid argument on SM103 for M=32768, K=65536.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type: fp8_block
            token_count: 32768
            input_features: 65536
    moe:
      rules:
        - reason_type: framework_version_unsupported
          version_prefixes: ["0.5.10"]
          reason: SGLang 0.5.10 MoE collector does not support GPT-OSS MoE cases.
          fields: [moe_type, num_tokens, hidden_size, inter_size, topk, num_experts, tensor_parallel_size, expert_parallel_size, model_path, token_expert_distribution, power_law_alpha, swiglu_limit]
          match:
            model_path:
              in: [openai/gpt-oss-20b, openai/gpt-oss-120b]
  trtllm:
    mla_bmm_gen_pre:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA BMM FP8 variants are only emitted for 86 < SM < 100.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
    mla_bmm_gen_post:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA BMM FP8 variants are only emitted for 86 < SM < 100.
          fields: [num_tokens, num_heads, dtype, num_warmups, num_runs]
          match:
            dtype: fp8
    mla_context_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA module FP8 KV-cache variants are Hopper-only; Blackwell FP8 KV applies to DSA.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            attn_type: mla
            kv_cache_dtype: fp8
    mla_generation_module:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM MLA module FP8 KV-cache variants are Hopper-only; Blackwell FP8 KV applies to DSA.
          fields: [seq_len, batch_size, num_heads, kv_cache_dtype, compute_dtype, gemm_type, model_path, attn_type]
          match:
            attn_type: mla
            kv_cache_dtype: fp8
    attention_context:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM Blackwell attention kernels reject GQA ratios >= 32 unless the ratio is a multiple of 32.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          conditions:
            - ratio:
                numerator: num_heads
                denominator: num_key_value_heads
                gte: 32
                mod_ne: [32, 0]
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: TRT-LLM Blackwell attention kernels reject GQA ratios >= 32 unless the ratio is a multiple of 32.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, tokens_per_block, use_fp8_kv_cache, use_fp8_context_fmha, is_context_phase]
          conditions:
            - ratio:
                numerator: num_heads
                denominator: num_key_value_heads
                gte: 32
                mod_ne: [32, 0]
  vllm:
    gemm:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM Blackwell block-FP8 GEMM requires token_count to be divisible by 4.
          fields: [gemm_type, token_count, output_features, input_features]
          match:
            gemm_type: fp8_block
            token_count:
              mod_ne: [4, 0]
    attention_generation:
      rules:
        - reason_type: hardware_unsupported
          reason: vLLM Blackwell FlashInfer/TRT-LLM batch decode supports GQA ratio <= 16.
          fields: [batch_size, sequence_length, num_heads, num_key_value_heads, head_dim, use_fp8_kv_cache, is_context_phase, window_size]
          conditions:
            - ratio:
                numerator: num_heads
                denominator: num_key_value_heads
                gt: 16
