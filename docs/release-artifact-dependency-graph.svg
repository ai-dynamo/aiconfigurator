<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1040" viewBox="0 0 1760 1040" role="img" aria-labelledby="title desc">
  <title id="title">Proposed AIC and Dynamo release artifact dependency graph</title>
  <desc id="desc">A left-to-right release dependency graph. Yellow nodes are AIC artifacts, blue nodes are Dynamo artifacts. Purple borders indicate Rust crates, green borders Python wheels, and red borders Docker images.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .text { font-family: Inter, Arial, sans-serif; fill: #111827; }
      .title { font-size: 25px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #64748B; }
      .phase { font-size: 17px; font-weight: 700; fill: #334155; }
      .node-title { font-size: 16px; font-weight: 700; }
      .node-subtitle { font-size: 13px; fill: #475569; }
      .entry-point { font-size: 20px; font-weight: 800; fill: #92400E; letter-spacing: 0.7px; }
      .entry-feature { font-size: 16px; font-weight: 700; fill: #111827; }
      .legend { font-size: 13px; font-weight: 600; }
      .edge { fill: none; stroke: #64748B; stroke-width: 2.2; marker-start: url(#arrow); }
      .separator { stroke: #CBD5E1; stroke-width: 1.5; stroke-dasharray: 5 7; }
      .aic { fill: #FFF3CD; }
      .dynamo { fill: #DBEAFE; }
      .rust { stroke: #7C3AED; stroke-width: 4; }
      .python { stroke: #059669; stroke-width: 4; }
      .docker { stroke: #DC2626; stroke-width: 4; }
      .box { rx: 12; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1760" height="1040" fill="#FFFFFF"/>

  <!-- Compact, single-row legend -->
  <rect x="40" y="22" width="1680" height="72" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="68" y="65" class="text title" style="font-size:17px">Legend</text>

  <rect x="160" y="37" width="135" height="42" rx="8" fill="#FFF3CD" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="227.5" y="63" text-anchor="middle" class="text legend">AIC artifact</text>

  <rect x="315" y="37" width="155" height="42" rx="8" fill="#DBEAFE" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="392.5" y="63" text-anchor="middle" class="text legend">Dynamo artifact</text>

  <rect x="520" y="37" width="135" height="42" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="4"/>
  <text x="587.5" y="63" text-anchor="middle" class="text legend">Rust crate</text>

  <rect x="675" y="37" width="150" height="42" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="4"/>
  <text x="750" y="63" text-anchor="middle" class="text legend">Python wheel</text>

  <rect x="845" y="37" width="155" height="42" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="4"/>
  <text x="922.5" y="63" text-anchor="middle" class="text legend">Docker image</text>

  <text id="graph-title" x="40" y="139" class="text title">Proposed release artifact dependency graph</text>
  <text x="40" y="163" class="text subtitle">Arrows point from a consuming artifact to the artifact it depends on.</text>

  <!-- Release phase columns -->
  <text x="210" y="210" text-anchor="middle" class="text phase">1 · AIC core</text>
  <text x="590" y="210" text-anchor="middle" class="text phase">2 · Dynamo crates and wheels</text>
  <text x="1000" y="210" text-anchor="middle" class="text phase">3 · AIC upper</text>
  <text x="1480" y="210" text-anchor="middle" class="text phase">4 · Dynamo images</text>

  <line x1="390" y1="184" x2="390" y2="1005" class="separator"/>
  <line x1="790" y1="184" x2="790" y2="1005" class="separator"/>
  <line x1="1205" y1="184" x2="1205" y2="1005" class="separator"/>

  <!-- Dependency edges, drawn behind nodes -->
  <path d="M210 375 L210 550" class="edge"/>
  <path d="M365 285 L440 287" class="edge"/>
  <path d="M365 345 L405 345 L405 517 L440 517" class="edge"/>
  <path d="M590 325 L590 365" class="edge"/>
  <path d="M590 440 L590 480" class="edge"/>
  <path d="M590 555 L590 580" class="edge"/>
  <path d="M350 600 L440 600" class="edge"/>
  <path d="M350 574 L770 574 L770 525 L1000 525 L1000 560" class="edge"/>
  <path d="M740 620 L835 620" class="edge"/>
  <path d="M740 592 L765 592 L765 300 L1280 300" class="edge"/>
  <path d="M740 637 L815 637 L815 780 L1280 780" class="edge"/>
  <path d="M350 623 L375 623 L375 810 L1280 810" class="edge"/>
  <path d="M1165 620 L1280 620" class="edge"/>

  <!-- Phase 1: AIC core -->
  <rect x="55" y="240" width="310" height="135" class="box aic rust"/>
  <text x="210" y="268" text-anchor="middle" class="text entry-point" style="font-size:17px">ADVANCED USER SDK</text>
  <text x="210" y="297" text-anchor="middle" class="text node-title" style="font-size:18px">aiconfigurator-core</text>
  <text x="210" y="326" text-anchor="middle" class="text entry-feature" style="font-size:14px">ITERATION-TIME ESTIMATION</text>
  <text x="210" y="349" text-anchor="middle" class="text node-subtitle" style="font-size:14px">e.g., HiSim</text>
  <text x="210" y="368" text-anchor="middle" class="text node-subtitle">Rust crate</text>

  <rect x="70" y="550" width="280" height="90" class="box aic python"/>
  <text x="210" y="587" text-anchor="middle" class="text node-title">aiconfigurator-core</text>
  <text x="210" y="613" text-anchor="middle" class="text node-subtitle">Standalone Python payload wheel</text>


  <!-- Phase 2: Dynamo crates and wheels -->
  <rect x="440" y="250" width="300" height="75" class="box dynamo rust"/>
  <text x="590" y="282" text-anchor="middle" class="text node-title">dynamo-mocker</text>
  <text x="590" y="305" text-anchor="middle" class="text node-subtitle">Rust crate</text>

  <rect x="440" y="365" width="300" height="75" class="box dynamo rust"/>
  <text x="590" y="397" text-anchor="middle" class="text node-title">dynamo-llm</text>
  <text x="590" y="420" text-anchor="middle" class="text node-subtitle">Rust crate</text>

  <rect x="440" y="480" width="300" height="75" class="box dynamo python"/>
  <text x="590" y="512" text-anchor="middle" class="text node-title">ai-dynamo-runtime</text>
  <text x="590" y="535" text-anchor="middle" class="text node-subtitle">Python wheel</text>

  <rect x="440" y="580" width="300" height="80" class="box dynamo python"/>
  <text x="590" y="615" text-anchor="middle" class="text node-title">ai-dynamo</text>
  <text x="590" y="639" text-anchor="middle" class="text node-subtitle">Python wheel</text>

  <rect x="440" y="730" width="300" height="80" class="box dynamo python"/>
  <text x="590" y="765" text-anchor="middle" class="text node-title">kvbm</text>
  <text x="590" y="789" text-anchor="middle" class="text node-subtitle">Python wheel · no AIC dependency</text>

  <!-- Phase 3: AIC upper -->
  <rect x="835" y="560" width="330" height="120" class="box aic python"/>
  <text x="1000" y="591" text-anchor="middle" class="text entry-point">USER ENTRY POINT</text>
  <text x="1000" y="621" text-anchor="middle" class="text node-title" style="font-size:18px">aiconfigurator</text>
  <text x="1000" y="649" text-anchor="middle" class="text entry-feature">SDK + CLI</text>
  <text x="1000" y="669" text-anchor="middle" class="text node-subtitle">Upper Python wheel</text>

  <!-- Phase 4: Dynamo images -->
  <rect x="1280" y="260" width="400" height="80" class="box dynamo docker"/>
  <text x="1480" y="292" text-anchor="middle" class="text node-title">Backend runtime images</text>
  <text x="1480" y="316" text-anchor="middle" class="text node-subtitle">vLLM · SGLang · TensorRT-LLM · no AIC upper</text>

  <rect x="1280" y="405" width="400" height="80" class="box dynamo docker"/>
  <text x="1480" y="437" text-anchor="middle" class="text node-title">kubernetes-operator</text>
  <text x="1480" y="461" text-anchor="middle" class="text node-subtitle">Docker image · no AIC dependency</text>

  <rect x="1280" y="580" width="400" height="80" class="box dynamo docker"/>
  <text x="1480" y="612" text-anchor="middle" class="text node-title">dynamo-planner / profiler</text>
  <text x="1480" y="636" text-anchor="middle" class="text node-subtitle">Docker image · contains AIC upper</text>

  <rect x="1280" y="740" width="400" height="80" class="box dynamo docker"/>
  <text x="1480" y="772" text-anchor="middle" class="text node-title">dynamo-frontend</text>
  <text x="1480" y="796" text-anchor="middle" class="text node-subtitle">Docker image · core through benchmark package</text>

  <rect x="1280" y="875" width="400" height="80" class="box dynamo docker"/>
  <text x="1480" y="907" text-anchor="middle" class="text node-title">snapshot-agent</text>
  <text x="1480" y="931" text-anchor="middle" class="text node-subtitle">Docker image · no AIC dependency</text>
</svg>
