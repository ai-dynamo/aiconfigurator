# Flat V2 task schema: one key per Task field, no mode/config/worker_config nesting.
# `exps` lists which experiments to run (in order); each other top-level key is an experiment.

exps:
- vllm_agg
- vllm_disagg
- sglang_agg
- sglang_disagg
- trtllm_agg
- trtllm_disagg
vllm_agg:
  isl: 4000
  serving_mode: agg
  total_gpus: 8
  tpot: 16.7
  ttft: 600.0
  osl: 500
  model_path: Qwen/Qwen3-32B-FP8
  system_name: h200_sxm
  backend_name: vllm
vllm_disagg:
  isl: 4000
  serving_mode: disagg
  total_gpus: 8
  tpot: 16.7
  ttft: 600.0
  osl: 500
  prefill_model_path: Qwen/Qwen3-32B-FP8
  prefill_backend_name: vllm
  decode_model_path: Qwen/Qwen3-32B-FP8
  decode_backend_name: vllm
  prefill_system_name: h200_sxm
  decode_system_name: h200_sxm
sglang_agg:
