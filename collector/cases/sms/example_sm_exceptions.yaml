schema_version: 1
sm_version: 100
description: >
  Template for SM-centric collector v2 exceptions. Create one file per SM
  version, for example sm100_exceptions.yaml. Exceptions remove op cases from
  the already merged base/model plan.

all_frameworks_op_exceptions:
  # Drop a whole op for this GPU:
  # attention_generation:
  #   drop: true
  #
  # Or remove a subset after the op generated model-specific cases:
  # moe:
  #   contains:
  #     - "tp=32"
  #   case_ids:
  #     - "sglang.moe:run_moe_torch:MoeCommonTestCase(...)"

framework_specific_op_exceptions:
  sglang:
    # wideep_moe:
    #   drop: true
  trtllm: {}
  vllm: {}
