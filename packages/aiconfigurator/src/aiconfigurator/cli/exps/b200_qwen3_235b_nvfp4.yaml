# Flat V2 task schema: one key per Task field, no mode/config/worker_config nesting.
# `exps` lists which experiments to run (in order); each other top-level key is an experiment.

exps:
- exp_agg
- exp_disagg
exp_agg:
  isl: 4000
  serving_mode: agg
  total_gpus: 8
  tpot: 16.7
  ttft: 600.0
  osl: 500
  model_path: nvidia/Qwen3-235B-A22B-NVFP4
  system_name: b200_sxm
  backend_name: trtllm
exp_disagg:
  isl: 4000
  serving_mode: disagg
  total_gpus: 8
  tpot: 16.7
  ttft: 600.0
  osl: 500
  prefill_model_path: nvidia/Qwen3-235B-A22B-NVFP4
  prefill_backend_name: trtllm
  decode_model_path: nvidia/Qwen3-235B-A22B-NVFP4
  decode_backend_name: trtllm
  prefill_system_name: b200_sxm
  decode_system_name: b200_sxm
